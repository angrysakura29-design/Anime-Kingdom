<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM | ඔබේ ඇනිමේ තෝතැන්න</title>
    
    <!-- වීඩියෝ ප්ලේ වීමට අවශ්‍ය HLS Library එක -->
    <script src="https://cdn.jsdelivr.net"></script>
    <!-- Icons සඳහා Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">

    <style>
        :root {
            --accent: #e50914; 
            --bg-dark: #0b0b0f;
            --card-bg: #1a1a22;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* Navigation */
        .top-nav {
            display: flex;
            justify-content: center;
            padding: 15px 0;
            background: rgba(0,0,0,0.9);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: 2px; }

        /* Hero Banner */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        .banner-img {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.4;
        }
        .hero-info { position: relative; z-index: 10; padding: 20px; width: 100%; }

        /* Search Bar (නිවැරදි කළ පෙනුම) */
        .search-container {
            display: flex;
            justify-content: center;
            max-width: 500px;
            margin: 20px auto;
            width: 90%;
        }
        #searchInput {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--accent);
            border-right: none;
            background: rgba(0,0,0,0.7);
            color: white;
            border-radius: 5px 0 0 5px;
            outline: none;
        }
        .search-btn {
            padding: 12px 20px;
            background: var(--accent);
            border: 2px solid var(--accent);
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 0 5px 5px 0;
        }

        /* Anime Rows */
        .row-section { padding: 20px 0 0 15px; }
        .row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-right: 15px;
        }
        .anime-row {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 10px 0;
            scrollbar-width: none;
        }
        .anime-row::-webkit-scrollbar { display: none; }

        /* Cards */
        .card {
            min-width: 150px;
            max-width: 150px;
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card-title {
            padding: 8px; font-size: 13px; text-align: center;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .tag-hd {
            position: absolute; top: 8px; right: 8px;
            background: var(--accent); font-size: 10px;
            padding: 2px 6px; border-radius: 3px; font-weight: bold;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed; z-index: 10000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center; align-items: center;
            overflow-y: auto;
        }
        .modal-content {
            background: #111; padding: 20px;
            width: 90%; max-width: 600px;
            border-radius: 15px; position: relative;
            border: 1px solid #333;
        }

        /* Episode List */
        #episode-list button {
            background: #222; color: white; border: 1px solid #444;
            padding: 8px 12px; margin: 4px; border-radius: 5px; cursor: pointer;
        }
        #episode-list button:hover { background: var(--accent); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%;
            background: #000; display: flex;
            padding: 12px 0; border-top: 1px solid #222;
        }
        .nav-item { flex: 1; text-align: center; color: #888; cursor: pointer; font-size: 12px; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo"><span style="color:white;">ANIME</span><span style="color:red;">KINGDOM</span></div>
    </nav>

    <div class="hero-banner">
        <img src="IMG_20260322_225449_963.jpg" class="banner-img">
        <div class="hero-info">
            <h1>WELCOME TO <span style="color:red;">ANIME KINGDOM</span></h1>
            <p>සෑම ඇනිමේ රසිකයෙකුටම ගැලපෙන අපූරු තෝතැන්න.</p>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search Anime...">
                <button class="search-btn" onclick="searchAnime()">SEARCH</button>
            </div>
        </div>
    </div>

    <div id="results-container" style="display:none; flex-wrap:wrap; justify-content:center; gap:15px; padding:20px;"></div>

    <div class="main-content">
        <section class="row-section">
            <div class="row-header"><h2>✨ Latest Anime</h2></div>
            <div class="anime-row" id="latestAnime"></div>
        </section>
        <section class="row-section">
            <div class="row-header"><h2>🔥 Trending</h2></div>
            <div class="anime-row" id="trendingAnime"></div>
        </section>
        <section class="row-section">
            <div class="row-header"><h2>🏆 Most Popular</h2></div>
            <div class="anime-row" id="popularAnime"></div>
        </section>
    </div>

    <!-- Detail Modal -->
    <div id="anime-modal" class="modal">
        <div class="modal-content" id="modal-body"></div>
    </div>

    <!-- Video Modal -->
    <div id="video-modal" class="modal" style="flex-direction: column;">
        <span onclick="closeVideo()" style="position:absolute; right:20px; top:20px; font-size:40px; color:white; cursor:pointer;">&times;</span>
        <video id="main-player" controls style="width:95%; max-width:800px; border:2px solid red; border-radius:10px;"></video>
        <h3 id="video-title" style="margin-top:15px; color:white;"></h3>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()"><i class="fas fa-home"></i><br>Home</div>
        <div class="nav-item" onclick="alert('ළඟදීම!')"><i class="fas fa-calendar-alt"></i><br>Schedule</div>
        <div class="nav-item" onclick="alert('ළඟදීම!')"><i class="fas fa-list"></i><br>My List</div>
    </div>

    <script>
        const CONSUMET_API = "https://corsproxy.io";

        window.onload = () => {
            loadSection('START_DATE_DESC', 'latestAnime');
            loadSection('TRENDING_DESC', 'trendingAnime');
            loadSection('POPULARITY_DESC', 'popularAnime');
            
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if(e.key === 'Enter') searchAnime();
            });
        };

        async function loadSection(sort, id) {
            const query = `query ($sort: [MediaSort]) { Page(perPage: 10) { media(sort: $sort, type: ANIME, isAdult: false) { id title { romaji english } coverImage { large } averageScore } } }`;
            try {
                const res = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, variables: { sort: [sort] } })
                });
                const json = await res.json();
                renderCards(json.data.Page.media, document.getElementById(id));
            } catch (e) { console.error(e); }
        }

        function renderCards(list, container) {
            container.innerHTML = list.map(anime => `
                <div class="card" onclick="showDetails(${anime.id})">
                    <span class="tag-hd">HD</span>
                    <img src="${anime.coverImage.large}">
                    <div class="card-title">${anime.title.english || anime.title.romaji}</div>
                </div>
            `).join('');
        }

        async function showDetails(id) {
            const modal = document.getElementById('anime-modal');
            const body = document.getElementById('modal-body');
            modal.style.display = "flex";
            body.innerHTML = "<p>Loading...</p>";

            const query = `query ($id: Int) { Media(id: $id) { title { romaji english } description coverImage { large } } }`;
            const res = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, variables: { id } })
            });
            const json = await res.json();
            const anime = json.data.Media;
            const title = anime.title.english || anime.title.romaji;

            body.innerHTML = `
                <span onclick="document.getElementById('anime-modal').style.display='none'" style="position:absolute; right:15px; top:10px; cursor:pointer; color:red; font-size:25px;">&times;</span>
                <img src="${anime.coverImage.large}" style="width:100%; border-radius:10px; height:200px; object-fit:cover;">
                <h3>${title}</h3>
                <div style="font-size:12px; color:#ccc; max-height:80px; overflow-y:auto; margin-bottom:15px;">${anime.description}</div>
                <div id="episode-list">Loading episodes...</div>
            `;
            loadEpisodes(title);
        }

        async function loadEpisodes(title) {
            try {
                const res = await fetch(`${CONSUMET_API}/${encodeURIComponent(title)}`);
                const data = await res.json();
                const animeId = data.results[0].id;
                
                const infoRes = await fetch(`${CONSUMET_API}/info/${animeId}`);
                const infoData = await infoRes.json();
                
                document.getElementById('episode-list').innerHTML = `
                    <div style="display:flex; flex-wrap:wrap; gap:5px; max-height:150px; overflow-y:auto;">
                        ${infoData.episodes.map(ep => `<button onclick="playEp('${ep.id}', '${title} - Ep ${ep.number}')">EP ${ep.number}</button>`).join('')}
                    </div>`;
            } catch (e) { document.getElementById('episode-list').innerText = "Episodes load කිරීමේ දෝෂයක්!"; }
        }

        async function playEp(id, title) {
            const res = await fetch(`${CONSUMET_API}/watch/${id}`);
            const data = await res.json();
            const link = data.sources.find(s => s.quality === '720p' || s.quality === 'default')?.url || data.sources[0].url;
            
            const player = document.getElementById('main-player');
            document.getElementById('video-modal').style.display = "flex";
            document.getElementById('video-title').innerText = title;

            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(link);
                hls.attachMedia(player);
                hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
            } else {
                player.src = link;
                player.play();
            }
        }

        function closeVideo() {
            const player = document.getElementById('main-player');
            player.pause(); player.src = "";
            document.getElementById('video-modal').style.display = "none";
        }

        async function searchAnime() {
            const val = document.getElementById('searchInput').value;
            if(!val) return;
            document.querySelector('.main-content').style.display = "none";
            const resContainer = document.getElementById('results-container');
            resContainer.style.display = "flex";
            resContainer.innerHTML = "Searching...";

            const query = `query ($search: String) { Page(perPage: 20) { media(search: $search, type: ANIME) { id title { romaji english } coverImage { large } } } }`;
            const res = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, variables: { search: val } })
            });
            const json = await res.json();
            renderCards(json.data.Page.media, resContainer);
        }
    </script>
</body>
</html>
