<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANIME KINGDOM</title>

<!-- ✅ HLS Player -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<!-- ✅ Icons -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
--accent:#e50914;
--bg:#0b0b0f;
--card-bg:#1a1a22;
--text:#fff;
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:var(--bg);
color:var(--text);
}

.top-nav{
display:flex;
justify-content:center;
padding:15px;
background:#000;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:900;
}

.hero{
height:250px;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

.search-container{
display:flex;
background:#111;
border-radius:30px;
padding:5px;
}

#searchInput{
border:none;
background:transparent;
color:white;
padding:10px;
outline:none;
}

.search-btn{
background:var(--accent);
border:none;
color:white;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
}

.anime-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:20px;
padding:20px;
}

.card{
background:var(--card-bg);
border-radius:12px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:230px;
object-fit:cover;
}

.card-title{
padding:10px;
text-align:center;
font-size:13px;
}

.modal{
display:none;
position:fixed;
inset:0;
background:var(--bg);
z-index:2000;
flex-direction:column;
overflow-y:auto;
}

.back-btn{
position:absolute;
top:20px;
left:20px;
background:var(--accent);
color:white;
padding:10px 20px;
border:none;
border-radius:30px;
cursor:pointer;
}

.ep-grid{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
padding:20px;
}

.ep-btn{
background:#1a1a22;
color:white;
border:1px solid #333;
padding:10px;
border-radius:8px;
cursor:pointer;
}

#video-modal{
display:none;
position:fixed;
inset:0;
background:#000;
z-index:3000;
flex-direction:column;
align-items:center;
justify-content:center;
}

#main-player{
width:100%;
max-width:900px;
aspect-ratio:16/9;
}
</style>
</head>

<body>

<nav class="top-nav">
<div class="logo">ANIME<span style="color:#e50914">KINGDOM</span></div>
</nav>

<div class="hero">
<div class="search-container">
<input id="searchInput" placeholder="Search anime...">
<button class="search-btn" onclick="searchAnime()">SEARCH</button>
</div>
</div>

<div id="popularAnime" class="anime-grid"></div>

<!-- DETAILS MODAL -->
<div id="anime-modal" class="modal">
<button class="back-btn" onclick="closeModal()">BACK</button>
<h1 id="modalTitle" style="text-align:center;margin-top:80px;"></h1>
<div id="episodeList" class="ep-grid"></div>
</div>

<!-- VIDEO PLAYER -->
<div id="video-modal">
<span onclick="closeVideo()"
style="position:absolute;top:20px;right:20px;font-size:40px;color:white;cursor:pointer;">&times;</span>
<video id="main-player" controls></video>
<h3 id="videoTitle" style="color:white;"></h3>
</div>

<script>

// ✅ Stable proxy
const CORS_PROXY="https://cors.isomorphic-git.org/";

const API="https://api.consumet.org";

// LOAD POPULAR
window.onload=loadPopular;

async function fetchAPI(path){
const res=await fetch(CORS_PROXY+API+path);
return res.json();
}

async function loadPopular(){

const res=await fetch("https://graphql.anilist.co",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
query:`query{
Page(perPage:12){
media(sort:TRENDING_DESC,type:ANIME){
title{english romaji}
coverImage{large}
}
}}`
})
});

const data=await res.json();

renderCards(data.data.Page.media);
}

// SHOW CARDS
function renderCards(list){
const container=document.getElementById("popularAnime");

container.innerHTML=list.map(a=>`
<div class="card"
onclick="showDetails('${a.title.english||a.title.romaji}')">
<img src="${a.coverImage.large}">
<div class="card-title">${a.title.english||a.title.romaji}</div>
</div>
`).join("");
}

// DETAILS
async function showDetails(title){

const modal=document.getElementById("anime-modal");
modal.style.display="flex";

document.getElementById("modalTitle").innerText=title;

const epDiv=document.getElementById("episodeList");
epDiv.innerHTML="Loading...";

try{

const sData=await fetchAPI(`/anime/gogoanime/${encodeURIComponent(title)}`);
const anime=sData.results[0];

const iData=await fetchAPI(`/anime/gogoanime/info/${anime.id}`);

const eps=iData.episodes;

epDiv.innerHTML=eps.map(ep=>`
<button class="ep-btn"
onclick="playVideo('${ep.id}','${title} EP ${ep.number}')">
EP ${ep.number}
</button>
`).join("");

}catch{
epDiv.innerHTML="Error loading episodes";
}
}

// PLAY VIDEO
async function playVideo(id,title){

try{

const data=await fetchAPI(`/anime/gogoanime/watch/${id}`);

const link=data.sources[0].url;

document.getElementById("video-modal").style.display="flex";
document.getElementById("videoTitle").innerText=title;

const player=document.getElementById("main-player");

if(Hls.isSupported()){
const hls=new Hls();
hls.loadSource(link);
hls.attachMedia(player);
hls.on(Hls.Events.MANIFEST_PARSED,()=>player.play());
}else{
player.src=link;
player.play();
}

}catch{
alert("Video error");
}
}

// SEARCH
async function searchAnime(){

const q=document.getElementById("searchInput").value;
if(!q)return;

const sData=await fetchAPI(`/anime/gogoanime/${encodeURIComponent(q)}`);

renderCards(sData.results);
}

function closeModal(){
document.getElementById("anime-modal").style.display="none";
}

function closeVideo(){
const p=document.getElementById("main-player");
p.pause();
p.src="";
document.getElementById("video-modal").style.display="none";
}

</script>

</body>
</html>
