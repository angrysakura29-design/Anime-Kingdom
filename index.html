<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM | Ultimate Experience</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    
    <style>
        :root { --accent: #e50914; --bg-dark: #0b0b0f; --card-bg: #1a1a22; --text-white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-white); overflow-x: hidden; padding-bottom: 80px; }
        
        .top-nav { display: flex; justify-content: center; padding: 15px 0; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); border-bottom: 1px solid #222; }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }

        .hero-banner { position: relative; width: 100%; min-height: 400px; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .banner-img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; filter: brightness(0.7); }
        .hero-info { position: relative; z-index: 10; text-align: center; width: 90%; max-width: 800px; }
        .hero-info h1 { font-size: clamp(28px, 6vw, 48px); font-weight: 800; text-transform: uppercase; margin-bottom: 15px; }

        .search-container { display: flex; justify-content: center; margin: 25px auto; max-width: 550px; width: 95%; }
        #searchInput { flex: 1; height: 55px; background: rgba(0, 0, 0, 0.8); border: 2px solid var(--accent); border-right: none; padding: 0 25px; color: white; border-radius: 30px 0 0 30px; outline: none; font-size: 16px; }
        .search-btn { height: 55px; padding: 0 30px; background: var(--accent); color: white; border: 2px solid var(--accent); cursor: pointer; border-radius: 0 30px 30px 0; font-weight: bold; font-size: 16px; }

        .row-section { padding: 25px 0 0 20px; }
        .row-header h2 { font-size: 22px; border-left: 5px solid var(--accent); padding-left: 15px; margin-bottom: 20px; }
        .anime-row { display: flex; overflow-x: auto; gap: 20px; padding: 10px 5px; scrollbar-width: none; }
        .anime-row::-webkit-scrollbar { display: none; }

        .card { position: relative; min-width: 170px; max-width: 170px; background: var(--card-bg); border-radius: 12px; overflow: hidden; transition: 0.4s; cursor: pointer; border: 1px solid #222; }
        .card:hover { transform: scale(1.1); z-index: 10; border-color: var(--accent); }
        .card img { width: 100%; height: 240px; object-fit: cover; }
        .card-title { font-size: 14px; padding: 12px 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; font-weight: 600; }

        /* Modal Styles */
        .modal { display: none; position: fixed; inset: 0; background: var(--bg-dark); z-index: 2000; flex-direction: column; overflow-y: auto; }
        .modal-header { position: sticky; top: 0; background: var(--bg-dark); padding: 15px 20px; z-index: 2100; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 15px; }
        .back-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; font-size: 14px; }

        .modal-body { padding: 30px 20px; text-align: center; }
        .ep-grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 25px; }
        .ep-btn { background: #1a1a22; color: white; border: 1px solid #444; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; min-width: 80px; }
        .ep-btn:hover { background: var(--accent); border-color: white; }

        #video-modal { display: none; position: fixed; inset: 0; background: #000; z-index: 3000; flex-direction: column; }
        .player-header { padding: 15px 20px; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.8); }
        .player-container { flex: 1; display: flex; align-items: center; justify-content: center; }
        .player-box { width: 100%; max-width: 1100px; aspect-ratio: 16/9; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo">ANIME<span style="color:var(--accent)">KINGDOM</span></div>
    </nav>

    <div class="hero-banner">
        <!-- Banner එකට උඹේ පින්තූරය -->
        <img src="IMG_20260322_225449_963.jpg" class="banner-img" onerror="this.src='https://wallpaperaccess.com'">
        <div class="hero-info">
            <h1>UNLIMITED <span style="color:var(--accent)">ANIME</span> STREAMING</h1>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search anime name..." onkeyup="searchAnime()">
                <button class="search-btn" onclick="searchAnime()">සොයන්න</button>
            </div>
        </div>
    </div>

    <div class="row-section">
        <div class="row-header"><h2>Trending Now</h2></div>
        <div class="anime-row" id="trendingGrid"></div>
    </div>

    <!-- Modals -->
    <div id="anime-modal" class="modal">
        <div class="modal-header">
            <button class="back-btn" onclick="closeModal()"><i class="fas fa-arrow-left"></i> BACK</button>
            <h3 id="modalTitle" style="color: white; font-size: 18px;"></h3>
        </div>
        <div class="modal-body">
            <div id="episode-list" class="ep-grid"></div>
        </div>
    </div>

    <div id="video-modal">
        <div class="player-header">
            <button class="back-btn" onclick="closeVideo()"><i class="fas fa-arrow-left"></i> BACK</button>
            <h3 id="playingTitle" style="color: white; font-size: 16px;"></h3>
        </div>
        <div class="player-container">
            <div class="player-box">
                <iframe id="videoFrame" src="" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        // මේ ලින්ක් ෂුවර් එකටම වැඩ කරනවා
        const animeData = [
            { title: "Solo Leveling", img: "https://s4.anilist.co", episodes: 12 },
            { title: "One Piece", img: "https://s4.anilist.co", episodes: 1100 },
            { title: "Jujutsu Kaisen", img: "https://s4.anilist.co", episodes: 24 },
            { title: "Naruto Shippuden", img: "https://s4.anilist.co", episodes: 500 },
            { title: "Demon Slayer", img: "https://s4.anilist.co", episodes: 44 },
            { title: "Attack on Titan", img: "https://s4.anilist.co", episodes: 87 },
            { title: "Bleach", img: "https://s4.anilist.co", episodes: 366 },
            { title: "Dragon Ball Super", img: "https://s4.anilist.co", episodes: 131 }
        ];

        window.onload = () => renderList(animeData);

        function renderList(list) {
            const grid = document.getElementById('trendingGrid');
            grid.innerHTML = list.map(anime => `
                <div class="card" onclick="openEpisodes('${anime.title}', ${anime.episodes})">
                    <img src="${anime.img}" referrerpolicy="no-referrer" loading="lazy">
                    <div class="card-title">${anime.title}</div>
                </div>
            `).join('');
        }

        function openEpisodes(title, epCount) {
            const modal = document.getElementById('anime-modal');
            const epList = document.getElementById('episode-list');
            document.getElementById('modalTitle').innerText = title;
            let btns = "";
            for(let i=1; i<=epCount; i++) {
                btns += `<button class="ep-btn" onclick="startPlay('${title}', ${i})">EP ${i}</button>`;
            }
            epList.innerHTML = btns;
            modal.style.display = "flex";
            document.body.style.overflow = "hidden";
        }

        function startPlay(title, epNum) {
            const iframe = document.getElementById('videoFrame');
            iframe.src = `https://vidsrc.to{encodeURIComponent(title)}/${epNum}`;
            document.getElementById('playingTitle').innerText = `${title} - EP ${epNum}`;
            document.getElementById('video-modal').style.display = "flex";
        }

        function searchAnime() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderList(animeData.filter(a => a.title.toLowerCase().includes(q)));
        }

        function closeModal() { document.getElementById('anime-modal').style.display = "none"; document.body.style.overflow = "auto"; }
        function closeVideo() { document.getElementById('videoFrame').src = ""; document.getElementById('video-modal').style.display = "none"; }
    </script>
</body>
</html>
