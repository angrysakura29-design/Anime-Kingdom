<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM | ඔබේ ඇනිමේ තෝතැන්න</title>
    
    <!-- වීඩියෝ ප්ලේ වීමට අවශ්‍ය HLS Library එක -->
    <script src="https://cdn.jsdelivr.net"></script>
    <!-- Icons සඳහා Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">

    <style>
        :root {
            --accent: #e50914; 
            --bg-dark: #0b0b0f;
            --card-bg: #1a1a22;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* Navigation */
        .top-nav {
            display: flex;
            justify-content: center;
            padding: 15px 0;
            background: rgba(0,0,0,0.9);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: 2px; }

        /* Hero Banner */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            background: #000;
        }
        .banner-img {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.5;
            filter: brightness(0.6);
        }
        .hero-info { position: relative; z-index: 10; padding: 20px; width: 100%; }
        .hero-info h1 { font-size: clamp(24px, 5vw, 42px); text-transform: uppercase; margin-bottom: 10px; text-shadow: 2px 2px 15px #000; font-weight: 800; }

        /* Search Bar */
        .search-container {
            display: flex;
            justify-content: center;
            max-width: 500px;
            margin: 25px auto;
            width: 90%;
        }
        #searchInput {
            flex: 1;
            height: 50px;
            padding: 0 20px;
            border: 2px solid var(--accent);
            border-right: none;
            background: rgba(0,0,0,0.8);
            color: white;
            border-radius: 8px 0 0 8px;
            outline: none;
            font-size: 16px;
        }
        .search-btn {
            height: 50px;
            padding: 0 25px;
            background: var(--accent);
            border: 2px solid var(--accent);
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 0 8px 8px 0;
        }

        /* Anime Rows */
        .row-section { padding: 20px 0 0 15px; }
        .row-header h2 { font-size: 20px; border-left: 4px solid var(--accent); padding-left: 12px; margin-bottom: 15px; }
        
        .anime-row {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 10px 5px;
            scrollbar-width: none;
        }
        .anime-row::-webkit-scrollbar { display: none; }

        /* Cards */
        .card {
            min-width: 160px;
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .card:hover { transform: scale(1.08); }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card-title { padding: 10px 5px; font-size: 13px; text-align: center; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Modals */
        .modal {
            display: none;
            position: fixed; z-index: 10000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center; align-items: center;
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background: #111; padding: 25px;
            width: 90%; max-width: 500px;
            border-radius: 15px; position: relative;
            border: 1px solid #333;
            box-shadow: 0 0 40px rgba(229, 9, 20, 0.3);
        }

        /* Episode Buttons */
        .ep-grid {
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; 
            max-height: 180px; overflow-y: auto; margin-top: 15px; padding: 5px;
        }
        .ep-btn {
            background: #222; color: white; border: 1px solid var(--accent);
            padding: 8px 12px; border-radius: 5px; cursor: pointer;
            font-weight: bold; font-size: 12px; transition: 0.2s;
        }
        .ep-btn:hover { background: var(--accent); border-color: white; }

        /* Video Modal */
        #video-modal { flex-direction: column; background: #000; }
        #main-player { width: 95%; max-width: 800px; border: 2px solid var(--accent); border-radius: 10px; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%;
            background: #000; display: flex;
            padding: 12px 0; border-top: 1px solid #222;
            z-index: 9999;
        }
        .nav-item { flex: 1; text-align: center; color: #888; font-size: 12px; cursor: pointer; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo"><span style="color:white;">ANIME</span><span style="color:red;">KINGDOM</span></div>
    </nav>

    <div class="hero-banner">
        <img src="IMG_20260322_225449_963.jpg" class="banner-img" id="heroImg" onerror="this.src='https://wallpaperaccess.com'">
        <div class="hero-info">
            <h1>WELCOME TO <span style="color:red;">ANIME KINGDOM</span></h1>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="ඇනිමේ නම සොයන්න...">
                <button class="search-btn" onclick="searchAnime()">සොයන්න</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <section class="row-section">
            <div class="row-header"><h2>✨ Popular Anime</h2></div>
            <div class="anime-row" id="popularAnime"></div>
        </section>
        <section class="row-section">
            <div class="row-header"><h2>🔥 Trending</h2></div>
            <div class="anime-row" id="trendingAnime"></div>
        </section>
    </div>

    <div id="anime-modal" class="modal">
        <div class="modal-content" id="modal-body"></div>
    </div>

    <div id="video-modal" class="modal">
        <span onclick="closeVideo()" style="position:absolute; right:20px; top:20px; font-size:40px; color:white; cursor:pointer; z-index:1001;">&times;</span>
        <video id="main-player" controls></video>
        <h3 id="video-title" style="margin-top:15px; color:white; text-align:center;"></h3>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()"><i class="fas fa-home"></i><br>Home</div>
        <div class="nav-item"><i class="fas fa-search"></i><br>Search</div>
        <div class="nav-item"><i class="fas fa-heart"></i><br>Watchlist</div>
    </div>

    <script>
        const CONSUMET_URL = "https://consumet-api-production-e852.up.railway.app";

        window.onload = () => {
            loadHomePage();
            document.getElementById('searchInput').addEventListener("keypress", (e) => { 
                if (e.key === "Enter") searchAnime(); 
            });
        };

        async function loadHomePage() {
            await fetchAniListData('POPULARITY_DESC', 'popularAnime');
            await fetchAniListData('TRENDING_DESC', 'trendingAnime');
        }

        async function fetchAniListData(sort, containerId) {
            const query = `query ($sort: [MediaSort]) { Page(page: 1, perPage: 12) { media(sort: $sort, type: ANIME, isAdult: false) { id title { romaji english } coverImage { large } } } }`;
            try {
                const response = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, variables: { sort: [sort] } })
                });
                const json = await response.json();
                renderCards(json.data.Page.media, containerId);
            } catch (e) { console.error(e); }
        }

        function renderCards(list, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = "";
            list.forEach(anime => {
                const title = anime.title.english || anime.title.romaji;
                container.innerHTML += `
                    <div class="card" onclick="showDetails(${anime.id}, '${title}')">
                        <img src="${anime.coverImage.large}">
                        <div class="card-title">${title}</div>
                    </div>`;
            });
        }

        async function showDetails(id, title) {
            const modal = document.getElementById('anime-modal');
            const modalBody = document.getElementById('modal-body');
            modal.style.display = "flex";
            modalBody.innerHTML = "<p style='color:white; text-align:center;'>පූරණය වෙමින්...</p>";

            const query = `query ($id: Int) { Media (id: $id) { title { romaji english } description coverImage { large } } }`;
            try {
                const response = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, variables: { id: id } })
                });
                const json = await response.json();
                const anime = json.data.Media;

                modalBody.innerHTML = `
                    <span style="position:absolute; right:15px; top:10px; font-size:30px; cursor:pointer; color:red; font-weight:bold; z-index:100;" onclick="closeModal()">&times;</span>
                    <img src="${anime.coverImage.large}" style="width:100%; border-radius:10px; max-height:200px; object-fit:cover;">
                    <h2 style="font-size:18px; margin:10px 0; color:white; text-align:center;">${title}</h2>
                    <div id="episode-list" class="ep-grid">
                        <p style="color:yellow; font-size:12px;">Episodes සොයමින්...</p>
                    </div>
                `;
                loadEpisodes(title);
            } catch (e) { console.error(e); }
        }

        async function loadEpisodes(title) {
            const epContainer = document.getElementById('episode-list');
            try {
                // 1. Search Anime via GogoAnime
                const searchRes = await fetch(`${CONSUMET_URL}/${encodeURIComponent(title)}`);
                const searchData = await searchRes.json();
                const animeId = searchData.results && searchData.results.length > 0 ? searchData.results[0].id : null;

                if (!animeId) {
                    epContainer.innerHTML = "<p style='color:red;'>Episodes සොයාගත නොහැකි විය!</p>";
                    return;
                }

                // 2. Get Info
                const infoRes = await fetch(`${CONSUMET_URL}/info/${animeId}`);
                const infoData = await infoRes.json();
                const episodes = infoData.episodes || [];

                if (episodes.length === 0) {
                    epContainer.innerHTML = "<p style='color:red;'>Episodes නොමැත.</p>";
                    return;
                }

                epContainer.innerHTML = "";
                episodes.forEach(ep => {
                    const btn = document.createElement('button');
                    btn.className = "ep-btn";
                    btn.innerText = `EP ${ep.number}`;
                    btn.onclick = () => startStreaming(ep.id, title, ep.number);
                    epContainer.appendChild(btn);
                });
            } catch (e) { 
                console.error(e);
                epContainer.innerHTML = "<p style='color:red;'>Error loading episodes!</p>"; 
            }
        }

        async function startStreaming(episodeId, title, num) {
            try {
                const res = await fetch(`${CONSUMET_URL}/watch/${episodeId}`);
                const data = await res.json();
                // Get HLS source (.m3u8)
                const source = data.sources.find(s => s.quality === 'default') || data.sources[0];
                
                if(source && source.url) {
                    playAnime(source.url, `${title} - Episode ${num}`);
                } else {
                    alert("Streaming link සොයාගත නොහැක!");
                }
            } catch (e) { alert("Video streaming error!"); }
        }

        function playAnime(url, title) {
            const vModal = document.getElementById('video-modal');
            const player = document.getElementById('main-player');
            vModal.style.display = "flex";
            document.getElementById('video-title').innerText = title;

            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(player);
                hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
            } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
                player.src = url;
                player.play();
            }
        }

        function closeModal() { document.getElementById('anime-modal').style.display = "none"; }
        function closeVideo() { 
            const player = document.getElementById('main-player');
            player.pause(); player.src = "";
            document.getElementById('video-modal').style.display = "none"; 
        }

        async function searchAnime() {
            const queryText = document.getElementById('searchInput').value;
            if(!queryText) return;
            const container = document.getElementById('popularAnime');
            container.innerHTML = "<p style='color:white; text-align:center;'>සොයමින් පවතී...</p>";
            
            const query = `query ($search: String) { Page(page: 1, perPage: 15) { media(search: $search, type: ANIME, isAdult: false) { id title { romaji english } coverImage { large } } } }`;
            try {
                const response = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, variables: { search: queryText } })
                });
                const json = await response.json();
                renderCards(json.data.Page.media, 'popularAnime');
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
