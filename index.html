<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM | ඔබේ ඇනිමේ තෝතැන්න</title>
    
    <!-- වීඩියෝ ප්ලේ වීමට අවශ්‍ය HLS Library එක -->
    <script src="https://cdn.jsdelivr.net"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">

    <style>
        :root { --accent: #e50914; --bg-dark: #0b0b0f; --card-bg: #1a1a22; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: white; overflow-x: hidden; padding-bottom: 80px; }
        .top-nav { display: flex; justify-content: center; padding: 15px 0; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: 2px; }
        .hero-banner { position: relative; width: 100%; height: 350px; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; background: #000; }
        .banner-img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; filter: brightness(0.6); }
        .hero-info { position: relative; z-index: 10; padding: 20px; width: 100%; }
        .hero-info h1 { font-size: clamp(24px, 5vw, 42px); text-transform: uppercase; margin-bottom: 10px; text-shadow: 2px 2px 15px #000; }
        .search-container { display: flex; justify-content: center; max-width: 500px; margin: 25px auto; width: 90%; }
        #searchInput { flex: 1; height: 50px; padding: 0 20px; border: 2px solid var(--accent); border-right: none; background: rgba(0,0,0,0.8); color: white; border-radius: 8px 0 0 8px; outline: none; }
        .search-btn { height: 50px; padding: 0 25px; background: var(--accent); border: 2px solid var(--accent); color: white; font-weight: bold; cursor: pointer; border-radius: 0 8px 8px 0; }
        .row-section { padding: 20px 0 0 15px; }
        .row-header h2 { font-size: 20px; border-left: 4px solid var(--accent); padding-left: 12px; margin-bottom: 15px; }
        .anime-row { display: flex; overflow-x: auto; gap: 15px; padding: 10px 5px; scrollbar-width: none; }
        .anime-row::-webkit-scrollbar { display: none; }
        .card { min-width: 160px; background: var(--card-bg); border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .card:hover { transform: scale(1.08); }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card-title { padding: 10px 5px; font-size: 13px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-content { background: #111; padding: 25px; width: 90%; max-width: 500px; border-radius: 15px; position: relative; border: 1px solid #333; }
        .ep-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-height: 150px; overflow-y: auto; margin-top: 15px; }
        .ep-btn { background: #222; color: white; border: 1px solid var(--accent); padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #video-modal { flex-direction: column; background: #000; }
        #main-player { width: 95%; max-width: 800px; border: 2px solid var(--accent); border-radius: 10px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #222; z-index: 9999; }
        .nav-item { flex: 1; text-align: center; color: #888; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo"><span style="color:white;">ANIME</span><span style="color:red;">KINGDOM</span></div>
    </nav>

    <div class="hero-banner">
        <img src="IMG_20260322_225449_963.jpg" class="banner-img" onerror="this.src='https://wallpaperaccess.com'">
        <div class="hero-info">
            <h1>WELCOME TO <span style="color:red;">ANIME KINGDOM</span></h1>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="ඇනිමේ නම සොයන්න...">
                <button class="search-btn" onclick="searchAnime()">සොයන්න</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <section class="row-section"><div class="row-header"><h2>✨ Popular</h2></div><div class="anime-row" id="popularAnime"></div></section>
        <section class="row-section"><div class="row-header"><h2>🔥 Trending</h2></div><div class="anime-row" id="trendingAnime"></div></section>
    </div>

    <div id="anime-modal" class="modal"><div class="modal-content" id="modal-body"></div></div>

    <div id="video-modal" class="modal">
        <span onclick="closeVideo()" style="position:absolute; right:20px; top:20px; font-size:40px; color:white; cursor:pointer;">&times;</span>
        <video id="main-player" controls></video>
        <h3 id="video-title" style="margin-top:15px; color:white; text-align:center;"></h3>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()"><i class="fas fa-home"></i><br>Home</div>
        <div class="nav-item"><i class="fas fa-search"></i><br>Search</div>
        <div class="nav-item"><i class="fas fa-heart"></i><br>Watchlist</div>
    </div>

    <script>
        // වඩාත් විශ්වාසවන්ත API එකක් භාවිතා කිරීම
        const BASE_API = "https://consumet-api-production-e852.up.railway.app";

        window.onload = () => {
            loadHomePage();
            document.getElementById('searchInput').addEventListener("keypress", (e) => { if (e.key === "Enter") searchAnime(); });
        };

        async function loadHomePage() {
            fetchAniList('POPULARITY_DESC', 'popularAnime');
            fetchAniList('TRENDING_DESC', 'trendingAnime');
        }

        async function fetchAniList(sort, id) {
            const query = `query ($sort: [MediaSort]) { Page(page: 1, perPage: 12) { media(sort: $sort, type: ANIME, isAdult: false) { id title { english romaji } coverImage { large } } } }`;
            try {
                const res = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, variables: { sort: [sort] } })
                });
                const json = await res.json();
                renderCards(json.data.Page.media, id);
            } catch (e) { console.error(e); }
        }

        function renderCards(list, id) {
            const container = document.getElementById(id);
            container.innerHTML = list.map(anime => `
                <div class="card" onclick="showDetails(${anime.id}, '${anime.title.english || anime.title.romaji}')">
                    <img src="${anime.coverImage.large}">
                    <div class="card-title">${anime.title.english || anime.title.romaji}</div>
                </div>`).join('');
        }

        async function showDetails(id, title) {
            const modal = document.getElementById('anime-modal');
            const modalBody = document.getElementById('modal-body');
            modal.style.display = "flex";
            modalBody.innerHTML = `
                <span style="position:absolute; right:15px; top:10px; font-size:30px; cursor:pointer; color:red;" onclick="closeModal()">&times;</span>
                <h2 style="font-size:18px; text-align:center; margin-bottom:15px;">${title}</h2>
                <div id="episode-list" class="ep-grid"><p>Episodes සොයමින්...</p></div>`;
            
            try {
                // මුලින්ම ඇනිමේ එක search කරලා ID එක ගන්න
                const sRes = await fetch(`${BASE_API}/${encodeURIComponent(title)}`);
                const sData = await sRes.json();
                const animeId = sData.results[0]?.id;

                if (!animeId) {
                    document.getElementById('episode-list').innerHTML = "<p style='color:red;'>Episodes සොයාගත නොහැකි විය!</p>";
                    return;
                }

                // දැන් ID එකෙන් episodes ගන්න
                const iRes = await fetch(`${BASE_API}/info/${animeId}`);
                const iData = await iRes.json();
                
                document.getElementById('episode-list').innerHTML = iData.episodes.map(ep => 
                    `<button class="ep-btn" onclick="startStream('${ep.id}', '${title} EP${ep.number}')">EP ${ep.number}</button>`
                ).join('');
            } catch (e) {
                document.getElementById('episode-list').innerHTML = "<p style='color:red;'>සර්වර් දෝෂයකි. නැවත උත්සාහ කරන්න.</p>";
            }
        }

        async function startStream(epId, fullTitle) {
            try {
                const res = await fetch(`${BASE_API}/watch/${epId}`);
                const data = await res.json();
                const link = data.sources.find(s => s.quality === 'default' || s.quality === '720p')?.url || data.sources[0].url;
                
                const vModal = document.getElementById('video-modal');
                const player = document.getElementById('main-player');
                vModal.style.display = "flex";
                document.getElementById('video-title').innerText = fullTitle;

                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(link);
                    hls.attachMedia(player);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
                } else {
                    player.src = link;
                    player.play();
                }
            } catch (e) { alert("වීඩියෝව පූරණය කළ නොහැක!"); }
        }

        function closeModal() { document.getElementById('anime-modal').style.display = "none"; }
        function closeVideo() { const p = document.getElementById('main-player'); p.pause(); p.src = ""; document.getElementById('video-modal').style.display = "none"; }

        async function searchAnime() {
            const q = document.getElementById('searchInput').value;
            if(!q) return;
            const query = `query ($search: String) { Page(page: 1, perPage: 15) { media(search: $search, type: ANIME, isAdult: false) { id title { english romaji } coverImage { large } } } }`;
            const res = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, variables: { search: q } })
            });
            const json = await res.json();
            renderCards(json.data.Page.media, 'popularAnime');
        }
    </script>
</body>
</html>
