<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM | Ultimate Database</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    
    <style>
        /* --- උඹේ Advance CSS එක --- */
        :root { --accent: #e50914; --bg-dark: #08080a; --card-bg: #14141d; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text); overflow-x: hidden; padding-bottom: 80px; }
        
        /* Navigation */
        .top-nav { display: flex; justify-content: center; padding: 15px 0; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px); border-bottom: 1px solid #222; }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }

        /* Banner */
        .hero-banner { position: relative; width: 100%; min-height: 400px; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .banner-img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; filter: brightness(0.6) blur(1px); }
        .hero-info { position: relative; z-index: 10; text-align: center; width: 90%; max-width: 800px; }
        .hero-info h1 { font-size: clamp(28px, 6vw, 48px); font-weight: 800; text-transform: uppercase; margin-bottom: 20px; text-shadow: 0 0 20px rgba(0,0,0,1); }

        /* Search */
        .search-container { display: flex; justify-content: center; margin: 25px auto; max-width: 600px; width: 95%; }
        #searchInput { flex: 1; height: 55px; background: rgba(0, 0, 0, 0.8); border: 2px solid var(--accent); border-right: none; padding: 0 25px; color: white; border-radius: 30px 0 0 30px; outline: none; font-size: 16px; }
        .search-btn { height: 55px; padding: 0 35px; background: var(--accent); color: white; border: 2px solid var(--accent); cursor: pointer; border-radius: 0 30px 30px 0; font-weight: bold; }

        /* Rows */
        .row-section { padding: 30px 0 0 20px; }
        .row-header { display: flex; align-items: center; margin-bottom: 20px; }
        .row-header h2 { font-size: 22px; border-left: 5px solid var(--accent); padding-left: 15px; }
        .anime-row { display: flex; overflow-x: auto; gap: 20px; padding: 15px 5px; scrollbar-width: none; }
        .anime-row::-webkit-scrollbar { display: none; }

        /* Cards */
        .card { position: relative; min-width: 170px; max-width: 170px; background: var(--card-bg); border-radius: 12px; overflow: hidden; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5); border: 1px solid #222; }
        .card:hover { transform: scale(1.1); z-index: 10; border-color: var(--accent); }
        .card img { width: 100%; height: 240px; object-fit: cover; }
        .card-title { font-size: 13px; padding: 12px 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; font-weight: 600; }
        .tag { position: absolute; top: 10px; right: 10px; background: var(--accent); color: white; font-size: 10px; padding: 3px 7px; border-radius: 4px; font-weight: bold; }

        /* Full Screen Modals with Back Button */
        .modal { display: none; position: fixed; inset: 0; background: var(--bg-dark); z-index: 2000; flex-direction: column; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-nav { padding: 20px; display: flex; align-items: center; gap: 20px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 2100; }
        .back-btn { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .back-btn:hover { background: #ff0000; transform: translateX(-5px); }

        .modal-body { padding: 40px 20px; text-align: center; overflow-y: auto; flex: 1; }
        .info-container { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        .info-img { width: 200px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 0 30px rgba(229, 9, 20, 0.3); }

        /* Video Player */
        #video-modal { display: none; position: fixed; inset: 0; background: #000; z-index: 3000; flex-direction: column; }
        .player-container { flex: 1; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Loader */
        .loader { display: none; width: 50px; height: 50px; border: 5px solid #222; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; padding: 15px 0; border-top: 1px solid #222; z-index: 1500; }
        .nav-item { flex: 1; color: #888; font-size: 13px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <nav class="top-nav"><div class="logo">ANIME<span style="color:var(--accent)">KINGDOM</span></div></nav>

    <div class="hero-banner">
        <!-- උඹේ Banner එක මෙන්න -->
        <img src="IMG_20260322_225449_963.jpg" class="banner-img" onerror="this.src='https://wallpaperaccess.com'">
        <div class="hero-info">
            <h1>UNLIMITED <span style="color:var(--accent)">ANIME</span> STREAMING</h1>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search from 10,000+ Anime..." onkeypress="if(event.key === 'Enter') searchAnime()">
                <button class="search-btn" onclick="searchAnime()">සොයන්න</button>
            </div>
        </div>
    </div>

    <div id="loader" class="loader" style="display: block;"></div>

    <!-- Trending Row -->
    <div class="row-section">
        <div class="row-header"><h2>Trending Now</h2></div>
        <div class="anime-row" id="trendingGrid"></div>
    </div>

    <!-- Popular Row -->
    <div class="row-section">
        <div class="row-header"><h2>All Time Popular</h2></div>
        <div class="anime-row" id="popularGrid"></div>
    </div>

    <!-- Details Modal -->
    <div id="details-modal" class="modal">
        <div class="modal-nav">
            <button class="back-btn" onclick="closeModal()"><i class="fas fa-arrow-left"></i> BACK</button>
            <h3 id="modalTitle" style="color: white; font-size: 18px;"></h3>
        </div>
        <div class="modal-body">
            <div class="info-container">
                <img id="modalImg" class="info-img">
                <p id="modalDesc" style="color: #ccc; line-height: 1.8; margin-bottom: 30px;"></p>
                <button class="back-btn" id="playBtn" style="padding: 15px 40px; font-size: 18px; border-radius: 10px;">
                    <i class="fas fa-play"></i> WATCH NOW
                </button>
                <p style="margin-top: 15px; font-size: 13px; color: var(--accent);">Seasons & Episodes available in player</p>
            </div>
        </div>
    </div>

    <!-- Video Player Modal -->
    <div id="video-modal" class="modal">
        <div class="modal-nav">
            <button class="back-btn" onclick="closeVideo()"><i class="fas fa-arrow-left"></i> BACK</button>
            <h3 id="playingTitle" style="color: white; font-size: 16px;"></h3>
        </div>
        <div class="player-container">
            <iframe id="videoFrame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item"><i class="fas fa-fire"></i>Trending</div>
        <div class="nav-item"><i class="fas fa-bookmark"></i>Watchlist</div>
    </div>

    <script>
        const API_URL = "https://graphql.anilist.co";
        
        window.onload = () => {
            fetchAnime("TRENDING_DESC", "trendingGrid");
            fetchAnime("POPULARITY_DESC", "popularGrid");
        };

        // දත්ත 1000ක් වුණත් ලස්සනට පේන්න AniList භාවිතා කරයි
        async function fetchAnime(sort, gridId) {
            const query = `query { Page(perPage: 15) { media(sort: ${sort}, type: ANIME) { id title { english romaji } coverImage { extraLarge } bannerImage description } } }`;
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const data = await res.json();
                renderCards(data.data.Page.media, gridId);
                document.getElementById('loader').style.display = 'none';
            } catch (e) { console.error(e); }
        }

        async function searchAnime() {
            const queryText = document.getElementById('searchInput').value;
            if(!queryText) return;
            document.getElementById('loader').style.display = 'block';
            const query = `query { Page(perPage: 15) { media(search: "${queryText}", type: ANIME) { id title { english romaji } coverImage { extraLarge } description } } }`;
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const data = await res.json();
                renderCards(data.data.Page.media, "trendingGrid");
                document.querySelector('.row-section h2').innerText = "Search Results";
                document.getElementById('loader').style.display = 'none';
                window.scrollTo(0, 450);
            } catch (e) { alert("Search Error!"); }
        }

        function renderCards(list, gridId) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = list.map(anime => {
                const title = anime.title.english || anime.title.romaji;
                const cleanDesc = (anime.description || "").replace(/<[^>]*>?/gm, '');
                return `
                <div class="card" onclick="openDetails('${title.replace(/'/g, "")}', '${anime.coverImage.extraLarge}', \`${cleanDesc}\`)">
                    <div class="tag">HD</div>
                    <img src="${anime.coverImage.extraLarge}" loading="lazy">
                    <div class="card-title">${title}</div>
                </div>`;
            }).join('');
        }

        function openDetails(title, img, desc) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalImg').src = img;
            document.getElementById('modalDesc').innerText = desc.substring(0, 300) + "...";
            document.getElementById('details-modal').style.display = "flex";
            document.getElementById('playBtn').onclick = () => startPlay(title);
            document.body.style.overflow = "hidden";
        }

        function startPlay(title) {
            const iframe = document.getElementById('videoFrame');
            // Embed Player එක (මෙය ඇතුළේ Seasons/Episodes ඔක්කොම තියෙනවා)
            iframe.src = `https://vidsrc.to{encodeURIComponent(title)}`;
            document.getElementById('playingTitle').innerText = "Watching: " + title;
            document.getElementById('video-modal').style.display = "flex";
        }

        function closeModal() { document.getElementById('details-modal').style.display = "none"; document.body.style.overflow = "auto"; }
        function closeVideo() { document.getElementById('videoFrame').src = ""; document.getElementById('video-modal').style.display = "none"; }
    </script>
</body>
</html>
