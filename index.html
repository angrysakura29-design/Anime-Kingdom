<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM</title>
    
    <!-- වීඩියෝ නිවැරදිව ප්ලේ වීමට අවශ්‍ය HLS Library එක (Update කළා) -->
    <script src="https://cdn.jsdelivr.net"></script>
    
    <link rel="stylesheet" href="style.css">
    
    <!-- Font Awesome Icons සඳහා නිවැරදි Link එක (Update කළා) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
</head>
<body>

    <nav class="top-nav">
        <div class="logo" style="font-size:28px; letter-spacing:2px; font-weight: bold; padding: 15px;">
            <span style="color:white;">ANIME</span><span style="color:red;">KINGDOM</span>
        </div>
    </nav>

    <!-- Banner -->
    <div class="hero-banner" style="position: relative; text-align: center;">
        <img src="IMG_20260322_225449_963.jpg" class="banner-img" alt="Banner" style="width: 100%; height: auto; max-height: 400px; object-fit: cover;">
        <div class="hero-info" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; width: 100%;">
            <h1 style="text-shadow: 2px 2px 10px rgba(0,0,0,0.8);">WELCOME TO <span class="brand-text" style="color: red;">ANIME KINGDOM</span></h1>
            <p style="text-shadow: 1px 1px 5px rgba(0,0,0,0.8);">සෑම ඇනිමේ රසිකයෙකුටම ගැලපෙන අපූරු තෝතැන්න.</p>

            <div style="margin: 20px 0;">
                <input type="text" id="searchInput" placeholder="Search Anime..." style="padding: 12px; width: 250px; border-radius: 5px; border: 2px solid red; background: rgba(0,0,0,0.7); color: white; outline: none;">
                <button onclick="searchAnime()" style="padding: 12px 25px; background: red; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.3s;">SEARCH</button>
            </div>
        </div>
    </div>

    <!-- සෙවුම් ප්‍රතිඵල -->
    <div id="results-container" style="display: none; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; background: #111;"></div>

    <div class="main-content" style="background: #000; padding-bottom: 80px; color: white;">
        
        <!-- Sections (Latest, Trending etc.) -->
        <section class="row-section" style="padding: 20px;">
            <div class="row-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h2>✨ Latest Anime</h2>
                <span class="see-all" style="color: red; cursor: pointer; font-weight: bold;" onclick="showSeeAll('START_DATE_DESC', 'Latest Anime')">See all</span>
            </div>
            <div class="anime-row" id="latestAnime" style="display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px;"></div>
        </section>

        <section class="row-section" style="padding: 20px;">
            <div class="row-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h2>🔥 Trending</h2>
                <span class="see-all" style="color: red; cursor: pointer; font-weight: bold;" onclick="showSeeAll('TRENDING_DESC', 'Trending Anime')">See all</span>
            </div>
            <div class="anime-row" id="trendingAnime" style="display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px;"></div>
        </section>

        <!-- (අනිත් Sections ද මෙලෙසම පවතී) -->
    </div>

    <!-- Modal for Details -->
    <div id="anime-modal" style="display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; overflow-y: auto; padding: 20px;">
        <div id="modal-body" style="background: #111; color: white; width: 95%; max-width: 600px; padding: 20px; border-radius: 15px; position: relative; border: 1px solid #333;">
            <span onclick="document.getElementById('anime-modal').style.display='none'" style="position: absolute; right: 15px; top: 10px; font-size: 30px; cursor: pointer; color: red;">&times;</span>
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav" style="position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid red; z-index: 5000;">
        <div class="nav-item active" onclick="goHome();" style="text-align: center; color: red; cursor: pointer;">
            <i class="fas fa-home"></i><br><span style="font-size: 12px;">Home</span>
        </div>
        <div class="nav-item" onclick="alert('Schedule එක ළඟදීම!');" style="text-align: center; color: white; cursor: pointer;">
            <i class="fas fa-calendar-alt"></i><br><span style="font-size: 12px;">Schedule</span>
        </div>
        <div class="nav-item" onclick="showMyList();" style="text-align: center; color: white; cursor: pointer;">
            <i class="fas fa-list"></i><br><span style="font-size: 12px;">My List</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
