<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM | ඔබේ ඇනිමේ තෝතැන්න</title>
    
    <script src="https://cdn.jsdelivr.net"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">

    <style>
        :root { --accent: #e50914; --bg: #0b0b0f; --card-bg: #1a1a22; --text: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 50px; }
        .top-nav { display: flex; justify-content: center; padding: 15px 0; background: #000; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 2px; }
        .hero { position: relative; height: 300px; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; }
        .hero-img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; filter: brightness(0.6); }
        .hero-info { position: relative; z-index: 10; text-align: center; width: 90%; }
        .search-box { display: flex; max-width: 500px; margin: 0 auto; background: rgba(255,255,255,0.1); border-radius: 30px; padding: 5px; border: 1px solid rgba(255,255,255,0.2); }
        .search-box input { flex: 1; background: transparent; border: none; padding: 10px 20px; outline: none; font-size: 16px; color: white; }
        .search-box button { background: var(--accent); border: none; padding: 10px 25px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card-bg); border-radius: 15px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 10px 25px rgba(229, 9, 20, 0.4); }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card-title { padding: 12px; font-size: 13px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .modal { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; flex-direction: column; overflow-y: auto; }
        .modal-header { position: relative; height: 250px; background: #000; }
        .modal-banner { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        .back-btn { position: absolute; top: 20px; left: 20px; background: var(--accent); color: white; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; z-index: 2100; border: none; display: flex; align-items: center; gap: 8px; }
        .modal-body { padding: 30px 20px; margin-top: -50px; position: relative; z-index: 10; background: var(--bg); border-radius: 40px 40px 0 0; }
        .ep-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; max-height: 250px; overflow-y: auto; }
        .ep-btn { background: #1a1a22; color: white; border: 1px solid #333; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .ep-btn:hover { background: var(--accent); border-color: white; }
        #video-modal { display:none; position:fixed; inset:0; background:#000; z-index:3000; flex-direction:column; align-items:center; justify-content:center; }
        #main-player { width: 100%; max-width: 900px; aspect-ratio: 16/9; background: #000; border: 1px solid #222; }
    </style>
</head>
<body>

    <nav class="top-nav"><div class="logo">ANIME<span style="color:var(--accent)">KINGDOM</span></div></nav>

    <div class="hero">
        <img src="IMG_20260322_225449_963.jpg" class="hero-img" onerror="this.src='https://wallpaperaccess.com'">
        <div class="hero-info">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ඇනිමේ නම සොයන්න...">
                <button onclick="searchAnime()">සොයන්න</button>
            </div>
        </div>
    </div>

    <div class="content"><div class="anime-grid" id="popularAnime"></div></div>

    <div id="anime-modal" class="modal">
        <div class="modal-header">
            <button class="back-btn" onclick="closeModal()"><i class="fas fa-arrow-left"></i> BACK</button>
            <img id="modalBanner" class="modal-banner">
        </div>
        <div class="modal-body">
            <h1 id="modalTitle"></h1>
            <p style="color: var(--accent); font-weight: bold;"><i class="fas fa-star"></i> High Quality Streaming</p>
            <div id="episodeList" class="ep-grid"></div>
        </div>
    </div>

    <div id="video-modal">
        <span onclick="closeVideo()" style="position:absolute; top:20px; right:20px; color:white; font-size:40px; cursor:pointer;">&times;</span>
        <video id="main-player" controls></video>
        <h4 id="videoTitle" style="color:white; margin-top:20px; text-align: center;"></h4>
    </div>

    <script>
        // වැඩ කරන API කිහිපයක් මෙතැන ඇත
        const API_LIST = [
            "https://api-consumet-org-five.vercel.app",
            "https://consumet-api-production-e852.up.railway.app",
            "https://api.consumet.org"
        ];

        window.onload = () => { loadPopular(); };

        // API කිහිපයක් පරීක්ෂා කර දත්ත ලබා ගැනීමේ Function එක
        async function fetchWithFallback(urlSuffix) {
            for (let baseUrl of API_LIST) {
                try {
                    const response = await fetch(`${baseUrl}${urlSuffix}`);
                    if (response.ok) return await response.json();
                } catch (e) { console.warn(`Failed: ${baseUrl}`); }
            }
            throw new Error("සියලුම සර්වර් දෝෂ සහිතයි.");
        }

        async function loadPopular() {
            const res = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: `query { Page(perPage: 15) { media(sort: TRENDING_DESC, type: ANIME) { id title { english romaji } coverImage { large } bannerImage } } }` })
            });
            const data = await res.json();
            renderCards(data.data.Page.media);
        }

        function renderCards(list) {
            const container = document.getElementById('popularAnime');
            container.innerHTML = list.map(anime => `
                <div class="card" onclick="showDetails('${anime.title.english || anime.title.romaji}', '${anime.bannerImage || anime.coverImage.large}')">
                    <img src="${anime.coverImage.large}">
                    <div class="card-title">${anime.title.english || anime.title.romaji}</div>
                </div>`).join('');
        }

        async function showDetails(title, banner) {
            const modal = document.getElementById('anime-modal');
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBanner').src = banner;
            modal.style.display = "flex";
            const epListDiv = document.getElementById('episodeList');
            epListDiv.innerHTML = "<p>Episodes පූරණය වෙමින්...</p>";

            try {
                // 1. Search Anime
                const sData = await fetchWithFallback(`/${encodeURIComponent(title)}`);
                const anime = sData.results && sData.results.length > 0 ? sData.results : null;

                if (!anime) { epListDiv.innerHTML = "<p>සොයාගත නොහැකි විය.</p>"; return; }

                // 2. Get Info
                const iData = await fetchWithFallback(`/info/${anime.id}`);
                const episodes = iData.episodes || [];

                epListDiv.innerHTML = episodes.map(ep => `<button class="ep-btn" onclick="playVideo('${ep.id}', '${title} - EP ${ep.number}')">EP ${ep.number}</button>`).join('');
            } catch (e) { epListDiv.innerHTML = "<p style='color:red;'>සර්වර් දෝෂයකි. නැවත උත්සාහ කරන්න.</p>"; }
        }

        async function playVideo(epId, title) {
            try {
                const data = await fetchWithFallback(`/watch/${epId}`);
                const link = data.sources.find(s => s.quality === '720p' || s.quality === 'default')?.url || data.sources.url;
                const player = document.getElementById('main-player');
                document.getElementById('video-modal').style.display = "flex";
                document.getElementById('videoTitle').innerText = title;
                if (Hls.isSupported()) {
                    const hls = new Hls(); hls.loadSource(link); hls.attachMedia(player);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
                } else { player.src = link; player.play(); }
            } catch (e) { alert("වීඩියෝ දෝෂයකි!"); }
        }

        function closeModal() { document.getElementById('anime-modal').style.display = "none"; }
        function closeVideo() { const p = document.getElementById('main-player'); p.pause(); p.src = ""; document.getElementById('video-modal').style.display = "none"; }
        
        async function searchAnime() {
            const q = document.getElementById('searchInput').value;
            if(!q) return;
            const res = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: `query ($q: String) { Page { media(search: $q, type: ANIME) { id title { english romaji } coverImage { large } bannerImage } } }`, variables: { q } })
            });
            const json = await res.json();
            renderCards(json.data.Page.media);
        }
    </script>
</body>
</html>
