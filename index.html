<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
</head>
<body>

    <nav class="top-nav">
    <!-- පැරණි පේළිය වෙනුවට මෙය දමන්න -->
    <div class="logo" style="font-size:28px; letter-spacing:2px;">
<span style="color:white;">ANIME</span><span style="color:red;">KINGDOM</span>
    </div>
</nav>

    <!-- Banner -->
    <div class="hero-banner">
        <img src="IMG_20260322_225449_963.jpg" class="banner-img">
        <div class="hero-info">
    <h1>WELCOME TO <span class="brand-text">ANIME KINGDOM</span></h1>
    <p>සෑම ඇනිමේ රසිකයෙකුටම ගැලපෙන අපූරු තෝතැන්න.</p>

    <!-- Search Box Section Start -->
<div style="text-align: center; margin: 30px 0;">
    <div class="search-wrapper" style="display: inline-flex; background: #1a1a1a; border-radius: 50px; padding: 5px; border: 1px solid #333;">
        <input type="text" id="searchInput" placeholder="Search Anime..." style="background: transparent; border: none; padding: 12px 20px; color: white; outline: none; width: 220px;">
        <button onclick="searchAnime()" style="background: #ff416c; border: none; color: white; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s;">
            SEARCH
        </button>
    </div>
</div>

<!-- සෙවුම් ප්‍රතිඵල පෙන්වන ස්ථානය (මෙය අනිවාර්යයි) -->
<div id="results-container" class="anime-row" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px;"></div>
<!-- Search Box Section End -->

   <div class="main-content">
        <!-- Section 1 -->
        <section class="row-section">
            <div class="row-header"><h2>Top TV Series</h2><span>See all</span></div>
            <div class="anime-row" id="tvSeries"></div> <!-- id="tvSeries" තිබිය යුතුමයි -->
        </section>

        <!-- Section 2 -->
        <section class="row-section">
            <div class="row-header"><h2>Top Movies</h2><span>See all</span></div>
            <div class="anime-row" id="topMovies"></div> <!-- id="topMovies" තිබිය යුතුමයි -->

        </section>

        <!-- Section 3 -->
        <section class="row-section">
            <div class="row-header"><h2>Most Popular</h2><span>See all</span></div>
            <div class="anime-row" id="mostPopular"></div> <!-- id="mostPopular" තිබිය යුතුමයි -->
        </section>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item"><i class="fas fa-calendar-alt"></i><span>Schedule</span></div>
        <div class="nav-item"><i class="fas fa-list"></i><span>My List</span></div>
        <div class="nav-item"><i class="fas fa-user"></i><span>Profile</span></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
