<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM | ඔබේ ඇනිමේ තෝතැන්න</title>
    
    <!-- වීඩියෝ ප්ලේ වීමට අවශ්‍ය HLS Library එක (අත්‍යවශ්‍යයි) -->
    <script src="https://cdn.jsdelivr.net"></script>
    <!-- Icons සඳහා Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">

    <style>
        :root {
            --accent: #e50914; 
            --bg-dark: #0b0b0f;
            --card-bg: #1a1a22;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* Navigation */
        .top-nav {
            display: flex;
            justify-content: center;
            padding: 15px 0;
            background: rgba(0,0,0,0.9);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: 2px; }

        /* Hero Banner */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        .banner-img {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.4;
            filter: brightness(0.5);
        }
        .hero-info { position: relative; z-index: 10; padding: 20px; width: 100%; }
        .hero-info h1 { font-size: 28px; text-transform: uppercase; margin-bottom: 10px; text-shadow: 2px 2px 10px #000; }

        /* Search Bar */
        .search-container {
            display: flex;
            justify-content: center;
            max-width: 500px;
            margin: 20px auto;
            width: 90%;
        }
        #searchInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid var(--accent);
            border-right: none;
            background: rgba(0,0,0,0.8);
            color: white;
            border-radius: 8px 0 0 8px;
            outline: none;
            font-size: 16px;
        }
        .search-btn {
            padding: 12px 20px;
            background: var(--accent);
            border: 2px solid var(--accent);
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 0 8px 8px 0;
        }

        /* Anime Rows */
        .row-section { padding: 20px 0 0 15px; }
        .row-header h2 { font-size: 18px; border-left: 4px solid var(--accent); padding-left: 10px; margin-bottom: 15px; }
        
        .anime-row {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 10px 0;
            scrollbar-width: none;
        }
        .anime-row::-webkit-scrollbar { display: none; }

        /* Cards */
        .card {
            min-width: 150px;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card-title { padding: 10px 5px; font-size: 12px; text-align: center; color: #eee; }

        /* Modals */
        .modal {
            display: none;
            position: fixed; z-index: 10000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #111; padding: 25px;
            width: 90%; max-width: 500px;
            border-radius: 15px; position: relative;
            border: 1px solid #333;
        }

        /* Video Modal */
        #video-modal { flex-direction: column; background: #000; }
        #main-player { width: 95%; max-width: 800px; border-radius: 10px; background: #000; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%;
            background: #000; display: flex;
            padding: 15px 0; border-top: 1px solid #222;
        }
        .nav-item { flex: 1; text-align: center; color: #888; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo"><span style="color:white;">ANIME</span><span style="color:red;">KINGDOM</span></div>
    </nav>

    <div class="hero-banner">
        <img src="https://wallpapers.com" class="banner-img">
        <div class="hero-info">
            <h1>WELCOME TO <span style="color:red;">ANIME KINGDOM</span></h1>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="ඇනිමේ නම ඇතුළත් කරන්න...">
                <button class="search-btn" onclick="searchAnime()">සොයන්න</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <section class="row-section">
            <div class="row-header"><h2>✨ Popular Anime</h2></div>
            <div class="anime-row" id="popularAnime"></div>
        </section>
        <section class="row-section">
            <div class="row-header"><h2>🔥 Trending</h2></div>
            <div class="anime-row" id="trendingAnime"></div>
        </section>
    </div>

    <!-- Details Modal -->
    <div id="anime-modal" class="modal">
        <div class="modal-content" id="modal-body"></div>
    </div>

    <!-- Video Modal -->
    <div id="video-modal" class="modal">
        <span onclick="closeVideo()" style="position:absolute; right:20px; top:20px; font-size:40px; color:white; cursor:pointer;">&times;</span>
        <video id="main-player" controls></video>
        <h3 id="video-title" style="margin-top:15px; color:white;"></h3>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()"><i class="fas fa-home"></i><br>Home</div>
        <div class="nav-item"><i class="fas fa-search"></i><br>Search</div>
        <div class="nav-item"><i class="fas fa-heart"></i><br>Watchlist</div>
    </div>

    <script>
        const ANIFY_API = "https://api.anify.tv";

        window.onload = () => {
            loadHomePage();
            document.getElementById('searchInput').addEventListener("keypress", (e) => { 
                if (e.key === "Enter") searchAnime(); 
            });
        };

        async function loadHomePage() {
            await fetchAniListData('POPULARITY_DESC', 'popularAnime');
            await fetchAniListData('TRENDING_DESC', 'trendingAnime');
        }

        async function fetchAniListData(sort, containerId) {
            const query = `query ($sort: [MediaSort]) { Page(page: 1, perPage: 10) { media(sort: $sort, type: ANIME, isAdult: false) { id title { romaji english } coverImage { large } averageScore } } }`;
            try {
                const response = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, variables: { sort: [sort] } })
                });
                const json = await response.json();
                renderCards(json.data.Page.media, containerId);
            } catch (e) { console.error(e); }
        }

        function renderCards(list, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = "";
            list.forEach(anime => {
                const title = anime.title.english || anime.title.romaji;
                container.innerHTML += `
                    <div class="card" onclick="showDetails(${anime.id})">
                        <img src="${anime.coverImage.large}">
                        <div class="card-title">${title}</div>
                    </div>`;
            });
        }

        async function showDetails(id) {
            const modal = document.getElementById('anime-modal');
            const modalBody = document.getElementById('modal-body');
            modal.style.display = "flex";
            modalBody.innerHTML = "<p style='color:white; text-align:center;'>Loading...</p>";

            const query = `query ($id: Int) { Media (id: $id) { title { romaji english } description coverImage { large } } }`;
            try {
                const response = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, variables: { id: id } })
                });
                const json = await response.json();
                const anime = json.data.Media;
                const title = anime.title.english || anime.title.romaji;

                modalBody.innerHTML = `
                    <span style="position:absolute; right:15px; top:10px; font-size:30px; cursor:pointer; color:red;" onclick="closeModal()">&times;</span>
                    <img src="${anime.coverImage.large}" style="width:100%; border-radius:10px; max-height:200px; object-fit:cover;">
                    <h2 style="font-size:18px; margin:10px 0;">${title}</h2>
                    <div id="episode-list" style="max-height:150px; overflow-y:auto; display:flex; flex-wrap:wrap; gap:5px;">
                        <p style="color:yellow; font-size:12px;">Episodes සොයමින්...</p>
                    </div>
                `;
                loadEpisodes(title);
            } catch (e) { console.error(e); }
        }

        async function loadEpisodes(title) {
            const epContainer = document.getElementById('episode-list');
            try {
                const res = await fetch(`${ANIFY_API}/search/anime/${encodeURIComponent(title)}`);
                const data = await res.json();
                const animeId = data.results?.[0]?.id;

                if (!animeId) {
                    epContainer.innerHTML = "<p style='color:red;'>Episodes සොයාගත නොහැකි විය.</p>";
                    return;
                }

                const infoRes = await fetch(`${ANIFY_API}/info/${animeId}`);
                const infoData = await infoRes.json();
                const episodes = infoData.episodes?.data || [];

                epContainer.innerHTML = "";
                episodes.forEach(ep => {
                    epContainer.innerHTML += `<button onclick="startStreaming('${animeId}', ${ep.number}, '${title}')" style="background:#222; color:white; border:1px solid red; padding:5px 10px; border-radius:4px; cursor:pointer;">EP ${ep.number}</button>`;
                });
            } catch (e) { epContainer.innerHTML = "<p style='color:red;'>Error loading episodes.</p>"; }
        }

        async function startStreaming(id, num, title) {
            try {
                const res = await fetch(`${ANIFY_API}/sources?id=${id}&episodeNumber=${num}&subType=sub&type=ANIME`);
                const data = await res.json();
                const videoUrl = data.sources?.[0]?.url;
                if(videoUrl) playAnime(videoUrl, `${title} - Episode ${num}`);
            } catch (e) { alert("වීඩියෝව පූරණය කළ නොහැක!"); }
        }

        function playAnime(url, title) {
            const vModal = document.getElementById('video-modal');
            const player = document.getElementById('main-player');
            vModal.style.display = "flex";
            document.getElementById('video-title').innerText = title;

            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(player);
                hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
            } else {
                player.src = url;
                player.play();
            }
        }

        function closeModal() { document.getElementById('anime-modal').style.display = "none"; }
        function closeVideo() { 
            const player = document.getElementById('main-player');
            player.pause(); player.src = "";
            document.getElementById('video-modal').style.display = "none"; 
        }
    </script>
</body>
</html>
