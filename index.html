<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM | ඔබේ ඇනිමේ තෝතැන්න</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --accent: #e50914; --bg: #0b0b0f; --card-bg: #1a1a22; --text: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 50px; }
        header { padding: 15px 5%; background: #000; border-bottom: 1px solid #222; text-align: center; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 2px; }
        .search-area { padding: 40px 5%; text-align: center; background: linear-gradient(rgba(0,0,0,0.5), var(--bg)), url('https://wallpaperaccess.com') center/cover; }
        .search-box { display: flex; max-width: 600px; margin: 0 auto; background: rgba(255,255,255,0.1); border-radius: 30px; padding: 5px; border: 1px solid #444; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px 20px; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 10px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 20px 5%; }
        .card { background: var(--card-bg); border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.05); border: 1px solid var(--accent); }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card-title { padding: 10px; font-size: 12px; text-align: center; }
        #video-modal { display:none; position:fixed; inset:0; background:#000; z-index:3000; flex-direction:column; align-items:center; justify-content:center; }
        video { width: 100%; max-width: 800px; aspect-ratio: 16/9; }
    </style>
</head>
<body>

<header><div class="logo">ANIME<span style="color:var(--accent)">KINGDOM</span></div></header>

<div class="search-area">
    <h1>Unlimited Anime Streaming</h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ඇනිමේ නම මෙතැන ලියන්න (උදා: Naruto)">
        <button onclick="searchAnime()">සොයන්න</button>
    </div>
</div>

<div id="loader" style="display:none; text-align:center; padding:20px;">පූරණය වෙමින්...</div>
<div class="anime-grid" id="animeGrid"></div>

<div id="video-modal">
    <button onclick="closeVideo()" style="position:absolute; top:20px; right:20px; padding:10px; background:red; color:white; border:none; cursor:pointer;">CLOSE</button>
    <video id="player" controls></video>
</div>

<script>
    // අලුත්ම වැඩ කරන සර්වර් සහ Proxy ලින්ක් එක
    const PROXY = "https://api.allorigins.win";
    const API_URL = "https://consumet-api-production-e852.up.railway.app";

    async function searchAnime() {
        const query = document.getElementById('searchInput').value;
        const grid = document.getElementById('animeGrid');
        const loader = document.getElementById('loader');
        
        if(!query) return;
        grid.innerHTML = "";
        loader.style.display = "block";

        try {
            // Proxy එක හරහා Request එක යැවීම
            const res = await fetch(PROXY + encodeURIComponent(API_URL + query));
            const data = await res.json();
            
            if(!data.results || data.results.length === 0) {
                grid.innerHTML = "<p>කිසිවක් සොයාගත නොහැකි විය.</p>";
            } else {
                data.results.forEach(anime => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<img src="${anime.image}"><div class="card-title">${anime.title}</div>`;
                    card.onclick = () => loadEpisodes(anime.id);
                    grid.appendChild(card);
                });
            }
        } catch (e) {
            alert("API එකේ ප්‍රශ්නයක්. කරුණාකර සුළු වෙලාවකින් නැවත උත්සාහ කරන්න.");
        }
        loader.style.display = "none";
    }

    async function loadEpisodes(animeId) {
        try {
            const res = await fetch(PROXY + encodeURIComponent(API_URL + "info/" + animeId));
            const data = await res.json();
            // පළමු episode එක ප්ලේ කරයි (ඔබට කැමති නම් episode list එකක් පෙන්විය හැක)
            playVideo(data.episodes[0].id);
        } catch (e) { alert("Episodes ලබාගත නොහැක."); }
    }

    async function playVideo(episodeId) {
        try {
            const res = await fetch(PROXY + encodeURIComponent(API_URL + "watch/" + episodeId));
            const data = await res.json();
            const link = data.sources.find(s => s.quality === 'default' || s.quality === '720p').url;

            const video = document.getElementById('player');
            document.getElementById('video-modal').style.display = "flex";

            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(link);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else {
                video.src = link;
                video.play();
            }
        } catch (e) { alert("වීඩියෝව ප්ලේ කළ නොහැක."); }
    }

    function closeVideo() {
        document.getElementById('player').pause();
        document.getElementById('video-modal').style.display = "none";
    }
</script>
</body>
</html>
