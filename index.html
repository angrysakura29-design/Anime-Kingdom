<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM | ඔබේ ඇනිමේ තෝතැන්න</title>
    
    <!-- වීඩියෝ ප්ලේ වීමට අවශ්‍ය HLS Library එක -->
    <script src="https://cdn.jsdelivr.net"></script>
    <!-- Icons සඳහා Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">

    <style>
        :root {
            --accent: #e50914; 
            --bg-dark: #0b0b0f;
            --card-bg: #1a1a22;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* Navigation */
        .top-nav {
            display: flex;
            justify-content: center;
            padding: 15px 0;
            background: rgba(0,0,0,0.9);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: 2px; }

        /* Hero Banner */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        .banner-img {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.4;
            filter: brightness(0.5);
        }
        .hero-info { position: relative; z-index: 10; padding: 20px; width: 100%; }
        .hero-info h1 { font-size: 28px; text-transform: uppercase; margin-bottom: 10px; text-shadow: 2px 2px 10px #000; }

        /* Search Bar (නිවැරදි කළ පිළිවෙළ) */
        .search-container {
            display: flex;
            justify-content: center;
            max-width: 500px;
            margin: 20px auto;
            width: 90%;
        }
        #searchInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid var(--accent);
            border-right: none;
            background: rgba(0,0,0,0.8);
            color: white;
            border-radius: 8px 0 0 8px;
            outline: none;
            font-size: 16px;
        }
        .search-btn {
            padding: 12px 20px;
            background: var(--accent);
            border: 2px solid var(--accent);
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 0 8px 8px 0;
            transition: 0.3s;
        }
        .search-btn:hover { background: #b20710; }

        /* Anime Rows */
        .row-section { padding: 20px 0 0 15px; }
        .row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-right: 15px;
        }
        .row-header h2 { font-size: 18px; border-left: 4px solid var(--accent); padding-left: 10px; }
        
        .anime-row {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 10px 0;
            scrollbar-width: none;
        }
        .anime-row::-webkit-scrollbar { display: none; }

        /* Cards */
        .card {
            min-width: 150px;
            max-width: 150px;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card-title {
            padding: 10px 5px; font-size: 13px; text-align: center;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: #eee;
        }
        .tag-hd {
            position: absolute; top: 8px; right: 8px;
            background: var(--accent); font-size: 10px;
            padding: 2px 6px; border-radius: 4px; font-weight: bold;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed; z-index: 10000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center; align-items: center;
            overflow-y: auto;
            padding: 20px 0;
        }
        .modal-content {
            background: #111; padding: 25px;
            width: 90%; max-width: 600px;
            border-radius: 15px; position: relative;
            border: 1px solid #333;
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        /* Episode List Buttons */
        #episode-list { margin-top: 15px; }
        .ep-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-height: 180px; overflow-y: auto; padding: 5px; }
        #episode-list button {
            background: #222; color: white; border: 1px solid #444;
            padding: 10px 15px; border-radius: 6px; cursor: pointer;
            font-weight: bold; transition: 0.2s;
        }
        #episode-list button:hover { background: var(--accent); border-color: white; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%;
            background: #000; display: flex;
            padding: 15px 0; border-top: 1px solid #222;
            z-index: 5000;
        }
        .nav-item { flex: 1; text-align: center; color: #888; cursor: pointer; font-size: 12px; }
        .nav-item i { font-size: 20px; margin-bottom: 5px; }
        .nav-item.active { color: var(--accent); }

        /* Video Modal */
        #video-modal { flex-direction: column; background: #000; }
        #main-player { width: 95%; max-width: 800px; border: 2px solid var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo"><span style="color:white;">ANIME</span><span style="color:red;">KINGDOM</span></div>
    </nav>

    <div class="hero-banner">
        <img src="IMG_20260322_225449_963.jpg" class="banner-img">
        <div class="hero-info">
            <h1>WELCOME TO <span style="color:red;">ANIME KINGDOM</span></h1>
            <p>සෑම ඇනිමේ රසිකයෙකුටම ගැලපෙන අපූරු තෝතැන්න.</p>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search Anime...">
                <button class="search-btn" onclick="searchAnime()">SEARCH</button>
            </div>
        </div>
    </div>

    <div id="results-container" style="display:none; flex-wrap:wrap; justify-content:center; gap:15px; padding:20px;"></div>

    <div class="main-content">
        <section class="row-section">
            <div class="row-header"><h2>✨ Latest Anime</h2></div>
            <div class="anime-row" id="latestAnime"></div>
        </section>
        <section class="row-section">
            <div class="row-header"><h2>🔥 Trending</h2></div>
            <div class="anime-row" id="trendingAnime"></div>
        </section>
        <section class="row-section">
            <div class="row-header"><h2>🏆 Most Popular</h2></div>
            <div class="anime-row" id="popularAnime"></div>
        </section>
    </div>

    <!-- Detail Modal -->
    <div id="anime-modal" class="modal">
        <div class="modal-content" id="modal-body"></div>
    </div>

    <!-- Video Modal -->
    <div id="video-modal" class="modal">
        <span onclick="closeVideo()" style="position:absolute; right:20px; top:20px; font-size:40px; color:white; cursor:pointer; z-index:1001;">&times;</span>
        <video id="main-player" controls></video>
        <h3 id="video-title" style="margin-top:15px; color:white; text-align:center;"></h3>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()"><i class="fas fa-home"></i><br>Home</div>
        <div class="nav-item" onclick="alert('Schedule එක ළඟදීම!')"><i class="fas fa-calendar-alt"></i><br>Schedule</div>
        <div class="nav-item" onclick="alert('My List එක ළඟදීම!')"><i class="fas fa-list"></i><br>My List</div>
    </div>

    <script>
        // CORS Proxy එක සමඟ නිවැරදි API URL එක
        const PROXY = "https://corsproxy.io?";
        const CONSUMET_BASE = "https://consumet-api-production-e852.up.railway.app";

        window.onload = () => {
            loadSection('START_DATE_DESC', 'latestAnime');
            loadSection('TRENDING_DESC', 'trendingAnime');
            loadSection('POPULARITY_DESC', 'popularAnime');
            
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if(e.key === 'Enter') searchAnime();
            });
        };

        async function loadSection(sort, id) {
            const query = `query ($sort: [MediaSort]) { Page(perPage: 15) { media(sort: $sort, type: ANIME, isAdult: false) { id title { romaji english } coverImage { large } } } }`;
            try {
                const res = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, variables: { sort: [sort] } })
                });
                const json = await res.json();
                renderCards(json.data.Page.media, document.getElementById(id));
            } catch (e) { console.error(e); }
        }

        function renderCards(list, container) {
            container.innerHTML = list.map(anime => `
                <div class="card" onclick="showDetails(${anime.id})">
                    <span class="tag-hd">HD</span>
                    <img src="${anime.coverImage.large}">
                    <div class="card-title">${anime.title.english || anime.title.romaji}</div>
                </div>
            `).join('');
        }

        async function showDetails(id) {
            const modal = document.getElementById('anime-modal');
            const body = document.getElementById('modal-body');
            modal.style.display = "flex";
            body.innerHTML = "<p style='text-align:center;'>විස්තර පූරණය වෙමින් පවතී...</p>";

            const query = `query ($id: Int) { Media(id: $id) { title { romaji english } description coverImage { large } } }`;
            const res = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, variables: { id } })
            });
            const json = await res.json();
            const anime = json.data.Media;
            const title = anime.title.english || anime.title.romaji;

            body.innerHTML = `
                <span onclick="document.getElementById('anime-modal').style.display='none'" style="position:absolute; right:15px; top:10px; cursor:pointer; color:red; font-size:30px; font-weight:bold;">&times;</span>
                <img src="${anime.coverImage.large}" style="width:100%; border-radius:12px; height:220px; object-fit:cover; margin-bottom:15px;">
                <h3 style="margin-bottom:10px;">${title}</h3>
                <div style="font-size:13px; color:#bbb; max-height:100px; overflow-y:auto; margin-bottom:20px; line-height:1.4;">${anime.description}</div>
                <div id="episode-list"><p style="text-align:center; color:yellow;">Episodes පූරණය වෙමින් පවතී...</p></div>
            `;
            loadEpisodes(title);
        }

        async function loadEpisodes(title) {
            const epDiv = document.getElementById('episode-list');
            try {
                // 1. Search Anime ID
                const searchRes = await fetch(`${PROXY}${CONSUMET_BASE}/${encodeURIComponent(title)}`);
                const searchData = await searchRes.json();
                
                // පළමු ප්‍රතිඵලයේ ID එක ලබා ගැනීම
                const animeId = searchData.results[0]?.id;

                if(!animeId) {
                    epDiv.innerHTML = "<p style='color:red; text-align:center;'>වීඩියෝව සොයාගත නොහැකි විය!</p>";
                    return;
                }

                // 2. Get Info and Episodes
                const infoRes = await fetch(`${PROXY}${CONSUMET_BASE}/info/${animeId}`);
                const infoData = await infoRes.json();
                
                epDiv.innerHTML = `
                    <h4 style="margin-bottom:10px; font-size:14px;">පවතින කොටස් (Episodes):</h4>
                    <div class="ep-grid">
                        ${infoData.episodes.map(ep => `<button onclick="playEp('${ep.id}', '${title} - Episode ${ep.number}')">EP ${ep.number}</button>`).join('')}
                    </div>`;
            } catch (e) { 
                epDiv.innerHTML = "<p style='color:red; text-align:center;'>Episodes පූරණය කිරීමේ දෝෂයක්!</p>"; 
            }
        }

        async function playEp(id, fullTitle) {
            try {
                const res = await fetch(`${PROXY}${CONSUMET_BASE}/watch/${id}`);
                const data = await res.json();
                const link = data.sources.find(s => s.quality === '720p' || s.quality === 'default')?.url || data.sources[0].url;
                
                const player = document.getElementById('main-player');
                document.getElementById('video-modal').style.display = "flex";
                document.getElementById('video-title').innerText = fullTitle;

                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(link);
                    hls.attachMedia(player);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
                } else {
                    player.src = link;
                    player.play();
                }
            } catch (e) { alert("වීඩියෝව ප්ලේ කිරීමට නොහැක!"); }
        }

        function closeVideo() {
            const player = document.getElementById('main-player');
            player.pause(); player.src = "";
            document.getElementById('video-modal').style.display = "none";
        }

        async function searchAnime() {
            const val = document.getElementById('searchInput').value;
            if(!val) return alert("කරුණාකර නමක් ටයිප් කරන්න!");
            
            document.querySelector('.main-content').style.display = "none";
            const resContainer = document.getElementById('results-container');
            resContainer.style.display = "flex";
            resContainer.innerHTML = "<p style='width:100%; text-align:center;'>සොයමින් පවතී...</p>";

            const query = `query ($search: String) { Page(perPage: 24) { media(search: $search, type: ANIME, isAdult: false) { id title { romaji english } coverImage { large } } } }`;
            const res = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, variables: { search: val } })
            });
            const json = await res.json();
            renderCards(json.data.Page.media, resContainer);
        }
    </script>
</body>
</html>
