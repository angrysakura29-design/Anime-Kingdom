<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM | ඔබේ ඇනිමේ තෝතැන්න</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
</head>
<body>

    <nav class="top-nav">
        <div class="logo">ANIME<span class="brand-text">KINGDOM</span></div>
    </nav>

    <div class="hero-banner">
        <img src="https://images.alphacoders.com" class="banner-img">
        <div class="hero-info">
            <h1>UNLIMITED <span class="brand-text">ANIME</span> STREAMING</h1>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="ඇනිමේ නම මෙතැන ලියන්න..." onkeypress="if(event.key === 'Enter') searchAnime()">
                <button onclick="searchAnime()">සොයන්න</button>
            </div>
        </div>
    </div>

    <div class="row-section">
        <div class="row-header"><h2 id="rowTitle">Trending Anime</h2></div>
        <div id="loader" class="loader">පූරණය වෙමින්...</div>
        <div class="anime-row" id="animeGrid"></div>
    </div>

    <!-- Episode Modal -->
    <div id="anime-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal-x" onclick="closeModal()">&times;</button>
            <h2 id="modalTitle"></h2>
            <div id="episode-list" class="ep-grid"></div>
        </div>
    </div>

    <!-- Player Modal -->
    <div id="video-modal">
        <div class="player-box">
            <button class="close-player-btn" onclick="closeVideo()">&times;</button>
            <iframe id="videoFrame" src="" allowfullscreen></iframe>
        </div>
        <h3 id="playingTitle" style="margin-top:20px; color:white; text-align: center;"></h3>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item"><i class="fas fa-fire"></i>Trending</div>
        <div class="nav-item"><i class="fas fa-bookmark"></i>Watchlist</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
