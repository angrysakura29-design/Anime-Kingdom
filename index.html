<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM</title>
    <link rel="stylesheet" href="style.css">
    <!-- නිවැරදි Icon Link එක පහත දැක්වේ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
</head>
<body>

    <nav class="top-nav">
        <div class="logo">ANIME <span>KINGDOM</span></div>
        <div class="nav-icons">
            <i class="fas fa-search"></i>
            <i class="fas fa-bell"></i>
        </div>
    </nav>

    <!-- Hero Banner (ලොකු පින්තූරය) -->
    <div class="hero-banner">
        <div class="overlay"></div>
        <div class="hero-info">
            <h1>JUJUTSU KAISEN</h1>
            <p class="genres">Action, Shounen, Supernatural</p>
            <div class="hero-btns">
                <button class="play-btn"><i class="fas fa-play"></i> Play Now</button>
                <button class="list-btn"><i class="fas fa-plus"></i> My List</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <section class="section">
            <h2 class="section-title">Trending Now</h2>
            <div class="anime-grid" id="animeGrid">
                <!-- JavaScript මගින් පෝස්ටර් මෙතනට එයි -->
            </div>
        </section>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item"><i class="fas fa-calendar-alt"></i><span>Schedule</span></div>
        <div class="nav-item"><i class="fas fa-list"></i><span>My List</span></div>
        <div class="nav-item"><i class="fas fa-user"></i><span>Profile</span></div>
    </div>

    <!-- Modal for Seasons & Episodes -->
    <div id="animeModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            <div class="selector-box">
                <label>Select Season:</label>
                <select id="seasonSelect" onchange="loadEpisodes()"></select>
            </div>
            <div class="episode-list" id="episodeList"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
