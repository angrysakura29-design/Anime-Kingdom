<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM | Ultimate Streaming</title>
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <link href="https://fonts.googleapis.com" rel="stylesheet">

    <style>
        :root { --primary: #e50914; --bg: #08080a; --card-bg: #14141d; --text: #ffffff; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* Navigation */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(0,0,0,0.9); border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 800; color: #fff; text-decoration: none; }
        .logo span { color: var(--primary); }

        /* Search Section */
        .hero { height: 350px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.6), var(--bg)), url('https://wallpaperaccess.com') center/cover; }
        .search-container { display: flex; width: 90%; max-width: 600px; background: rgba(255,255,255,0.1); border-radius: 30px; padding: 5px; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); }
        #searchInput { flex: 1; height: 45px; padding: 0 20px; border: none; background: transparent; color: white; outline: none; }
        .search-btn { height: 45px; padding: 0 25px; background: var(--primary); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 25px; }

        /* Grid */
        .container { padding: 30px 5%; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(229,9,20,0.3); }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card-title { padding: 10px; font-size: 13px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; flex-direction: column; overflow-y: auto; }
        .modal-header { height: 300px; position: relative; }
        .modal-banner { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        .close-btn { position: absolute; top: 20px; left: 20px; background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .modal-content { padding: 30px 5%; margin-top: -50px; background: var(--bg); border-radius: 30px 30px 0 0; position: relative; }
        .ep-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .ep-btn { background: #222; color: white; border: 1px solid #444; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .ep-btn:hover { background: var(--primary); }

        /* Player */
        #video-modal { display: none; position: fixed; inset: 0; background: #000; z-index: 3000; align-items: center; justify-content: center; flex-direction: column; }
        video { width: 95%; max-width: 900px; aspect-ratio: 16/9; background: #000; }

        /* Loader */
        .loader { display: none; width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">ANIME<span>KINGDOM</span></a>
    </header>

    <div class="hero">
        <h1 style="margin-bottom: 20px; text-align: center;">Unlimited Anime Streaming</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="ඇනිමේ නම මෙතැන ලියන්න...">
            <button class="search-btn" onclick="searchAnime()">සොයන්න</button>
        </div>
    </div>

    <div class="container">
        <h2 id="gridTitle">Trending Now</h2>
        <div id="mainLoader" class="loader" style="display: block;"></div>
        <div class="anime-grid" id="animeGrid"></div>
    </div>

    <!-- Detail Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-header">
            <button class="close-btn" onclick="closeModal()">BACK</button>
            <img id="modalBanner" class="modal-banner">
        </div>
        <div class="modal-content">
            <h1 id="modalTitle"></h1>
            <p id="modalDesc" style="color: #ccc; line-height: 1.6;"></p>
            <h3>Episodes</h3>
            <div id="epLoader" class="loader"></div>
            <div class="ep-grid" id="epList"></div>
        </div>
    </div>

    <!-- Player Modal -->
    <div id="video-modal">
        <button class="close-btn" onclick="closeVideo()" style="top:20px; right:20px; left:auto;">CLOSE</button>
        <video id="player" controls></video>
        <h3 id="playingNow" style="margin-top:20px;"></h3>
    </div>

    <script>
        // වඩාත් ස්ථාවර CORS Proxy එකක් භාවිතය
        const PROXY = "https://api.allorigins.win";
        const API_BASE = "https://api.consumet.org";

        window.onload = loadTrending;

        async function loadTrending() {
            try {
                const res = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: `query { Page(perPage: 18) { media(sort: TRENDING_DESC, type: ANIME) { id title { english romaji } coverImage { extraLarge } bannerImage description } } }` })
                });
                const data = await res.json();
                renderCards(data.data.Page.media);
            } catch (e) { console.error(e); }
            document.getElementById('mainLoader').style.display = 'none';
        }

        function renderCards(list) {
            const grid = document.getElementById('animeGrid');
            grid.innerHTML = list.map(anime => {
                const title = anime.title.english || anime.title.romaji;
                const desc = (anime.description || "").replace(/<[^>]*>?/gm, '');
                return `
                <div class="card" onclick="showDetails('${title.replace(/'/g, "")}', '${anime.bannerImage || anime.coverImage.extraLarge}', \`${desc}\`)">
                    <img src="${anime.coverImage.extraLarge}" loading="lazy">
                    <div class="card-title">${title}</div>
                </div>`;
            }).join('');
        }

        async function searchAnime() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            document.getElementById('animeGrid').innerHTML = "";
            document.getElementById('mainLoader').style.display = 'block';
            document.getElementById('gridTitle').innerText = `Results for "${query}"`;

            try {
                // සෙවීමේදී Proxy එකක් හරහා දත්ත ලබා ගැනීම
                const url = `${PROXY}${encodeURIComponent(API_BASE + '/' + query)}`;
                const res = await fetch(url);
                const data = await res.json();
                
                const formatted = data.results.map(item => ({
                    title: { english: item.title },
                    coverImage: { extraLarge: item.image },
                    bannerImage: item.image,
                    description: "No description available."
                }));
                renderCards(formatted);
            } catch (e) { alert("දත්ත ලබා ගැනීමට නොහැකි විය. කරුණාකර නැවත උත්සාහ කරන්න."); }
            document.getElementById('mainLoader').style.display = 'none';
        }

        async function showDetails(title, banner, desc) {
            const modal = document.getElementById('detailModal');
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBanner').src = banner;
            document.getElementById('modalDesc').innerText = desc;
            modal.style.display = "flex";
            
            const epList = document.getElementById('epList');
            const epLoader = document.getElementById('epLoader');
            epList.innerHTML = "";
            epLoader.style.display = "block";

            try {
                const sUrl = `${PROXY}${encodeURIComponent(API_BASE + '/' + title)}`;
                const sRes = await fetch(sUrl);
                const sData = await sRes.json();
                const animeId = sData.results[0].id;

                const iUrl = `${PROXY}${encodeURIComponent(API_BASE + '/info/' + animeId)}`;
                const iRes = await fetch(iUrl);
                const iData = await iRes.json();

                epLoader.style.display = "none";
                epList.innerHTML = iData.episodes.map(ep => 
                    `<button class="ep-btn" onclick="playVideo('${ep.id}', '${title} - Ep ${ep.number}')">Ep ${ep.number}</button>`
                ).join('');
            } catch (e) { 
                epLoader.style.display = "none";
                epList.innerHTML = "Episodes ලබා ගැනීමට නොහැකි විය.";
            }
        }

        async function playVideo(id, title) {
            const player = document.getElementById('player');
            const modal = document.getElementById('video-modal');
            document.getElementById('playingNow').innerText = title;

            try {
                const url = `${PROXY}${encodeURIComponent(API_BASE + '/watch/' + id)}`;
                const res = await fetch(url);
                const data = await res.json();
                const streamUrl = data.sources.find(s => s.quality === '720p' || s.quality === 'default').url;

                modal.style.display = "flex";
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(streamUrl);
                    hls.attachMedia(player);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
                } else {
                    player.src = streamUrl;
                    player.play();
                }
            } catch (e) { alert("වීඩියෝව ප්ලේ කිරීමට නොහැක."); }
        }

        function closeModal() { document.getElementById('detailModal').style.display = "none"; }
        function closeVideo() { document.getElementById('player').pause(); document.getElementById('video-modal').style.display = "none"; }
    </script>
</body>
</html>
