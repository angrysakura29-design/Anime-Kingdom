<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ANIME KINGDOM</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#0b0b0f;color:#fff;font-family:sans-serif}

.top-nav{background:#000;padding:15px;text-align:center;font-size:24px;font-weight:bold}

.hero{
height:250px;
background:url("https://wallpaperaccess.com/full/7053702.jpg") center/cover;
display:flex;
align-items:center;
justify-content:center
}

.search-container{background:#111;padding:5px;border-radius:30px}

input{background:transparent;border:none;color:white;padding:10px;outline:none}

button{background:#e50914;color:white;border:none;padding:10px 20px;border-radius:20px;cursor:pointer}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:20px;padding:20px}

.card{background:#1a1a22;border-radius:12px;overflow:hidden;cursor:pointer}

.card img{width:100%;height:230px;object-fit:cover}

.modal{
display:none;
position:fixed;
inset:0;
background:#0b0b0f;
z-index:1000;
overflow:auto
}

.back-btn{
position:fixed;
top:15px;
left:15px;
background:#e50914;
padding:10px 20px;
border-radius:25px
}

.ep-btn{margin:5px;padding:10px;background:#1a1a22;border:1px solid #333;color:white;border-radius:8px}

#video-modal{
display:none;
position:fixed;
inset:0;
background:black;
z-index:2000;
align-items:center;
justify-content:center;
flex-direction:column
}

video{width:90%;max-width:900px}
</style>
</head>

<body>

<div class="top-nav">ANIME KINGDOM</div>

<div class="hero">
<div class="search-container">
<input id="searchInput" placeholder="Search anime...">
<button onclick="searchAnime()">SEARCH</button>
</div>
</div>

<div id="grid" class="grid"></div>

<div id="modal" class="modal">
<button class="back-btn" onclick="closeModal()">BACK</button>
<h2 id="title" style="text-align:center;margin-top:80px"></h2>
<div id="episodes" style="text-align:center"></div>
</div>

<div id="video-modal">
<span onclick="closeVideo()" style="position:absolute;top:20px;right:20px;font-size:40px;cursor:pointer">&times;</span>
<video id="player" controls></video>
</div>

<script>

const API="https://api.consumet.org/anime/gogoanime";

window.onload=loadPopular;

async function loadPopular(){

const res=await fetch("https://graphql.anilist.co",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
query:`query{
Page(perPage:12){
media(sort:TRENDING_DESC,type:ANIME){
title{english romaji}
coverImage{large}
}
}}`
})
});

const data=await res.json();

document.getElementById("grid").innerHTML=
data.data.Page.media.map(a=>`
<div class="card"
onclick="showDetails('${a.title.english||a.title.romaji}')">
<img src="${a.coverImage.large}">
</div>
`).join("");
}

// DETAILS
async function showDetails(name){

document.getElementById("modal").style.display="block";
document.getElementById("title").innerText=name;

const epDiv=document.getElementById("episodes");
epDiv.innerHTML="Loading episodes...";

try{

const s=await fetch(`${API}/${encodeURIComponent(name)}`);
const sData=await s.json();

const anime=sData.results[0];

const i=await fetch(`${API}/info/${anime.id}`);
const iData=await i.json();

epDiv.innerHTML=iData.episodes.map(ep=>`
<button class="ep-btn"
onclick="playVideo('${ep.id}')">
EP ${ep.number}
</button>
`).join("");

}catch{
epDiv.innerHTML="Episodes load failed ❌";
}
}

// VIDEO
async function playVideo(id){

try{

const res=await fetch(`${API}/watch/${id}`);
const data=await res.json();

const link=data.sources[0].url;

document.getElementById("video-modal").style.display="flex";

const player=document.getElementById("player");

if(Hls.isSupported()){
const hls=new Hls();
hls.loadSource(link);
hls.attachMedia(player);
hls.on(Hls.Events.MANIFEST_PARSED,()=>player.play());
}else{
player.src=link;
player.play();
}

}catch{
alert("Video error");
}
}

// SEARCH
async function searchAnime(){

const q=document.getElementById("searchInput").value;
if(!q)return;

const res=await fetch(`${API}/${encodeURIComponent(q)}`);
const data=await res.json();

document.getElementById("grid").innerHTML=
data.results.map(a=>`
<div class="card"
onclick="showDetails('${a.title}')">
<img src="${a.image}">
</div>
`).join("");
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function closeVideo(){
document.getElementById("video-modal").style.display="none";
const p=document.getElementById("player");
p.pause();
p.src="";
}

</script>

</body>
</html>
