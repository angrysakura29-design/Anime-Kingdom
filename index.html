<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME KINGDOM | ඔබේ ඇනිමේ තෝතැන්න</title>
    
    <script src="https://cdn.jsdelivr.net"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">

    <style>
        :root { --accent: #c6ff00; --bg: #0b0b0f; --card: #1a1a22; }
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; overflow-x: hidden; }
        
        /* Navigation */
        .top-nav { display: flex; justify-content: center; padding: 15px 0; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 2px; }

        /* Banner & Search */
        .hero { position: relative; height: 350px; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; }
        .hero-img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        .hero-info { position: relative; z-index: 10; text-align: center; width: 90%; }
        .search-box { display: flex; max-width: 500px; margin: 20px auto; background: rgba(255,255,255,0.1); border-radius: 30px; padding: 5px 15px; border: 1px solid rgba(255,255,255,0.2); }
        .search-box input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 16px; }
        .search-box button { background: var(--accent); border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }

        /* Grid */
        .content { padding: 20px; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 5px 20px rgba(198, 255, 0, 0.2); }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card-title { padding: 10px; font-size: 13px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Modal UI (ඔබ එවූ පින්තූරයේ ආකාරයට) */
        .modal { display: none; position: fixed; inset: 0; background: #0b0b0f; z-index: 2000; flex-direction: column; overflow-y: auto; }
        .modal-header { position: relative; height: 250px; }
        .modal-banner { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .back-btn { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 50%; cursor: pointer; }
        
        .modal-body { padding: 20px; margin-top: -50px; position: relative; z-index: 10; background: var(--bg); border-radius: 30px 30px 0 0; }
        .anime-meta { text-align: center; }
        .anime-meta h1 { font-size: 22px; margin: 10px 0; }
        
        .action-btns { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        .btn-watch { background: var(--accent); color: black; padding: 12px 40px; border-radius: 10px; font-weight: bold; cursor: pointer; flex: 1; text-align: center; }
        .btn-list { background: white; color: black; padding: 12px 40px; border-radius: 10px; font-weight: bold; cursor: pointer; flex: 1; text-align: center; }

        /* Episode List Styles */
        .ep-section { margin-top: 20px; }
        .ep-item { display: flex; align-items: center; background: #1a1a22; padding: 10px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .ep-item:hover { background: #2a2a35; }
        .ep-thumb { width: 80px; height: 50px; background: #333; border-radius: 5px; display: flex; align-items: center; justify-content: center; margin-right: 15px; }
        .ep-info { flex: 1; }
        .ep-info h4 { margin: 0; font-size: 14px; }
        .ep-info p { margin: 5px 0 0; font-size: 12px; color: #888; }

        /* Player Modal */
        #video-modal { display:none; position:fixed; inset:0; background:#000; z-index:3000; flex-direction:column; align-items:center; justify-content:center; }
        #main-player { width: 100%; max-width: 800px; aspect-ratio: 16/9; background: #000; }
    </style>
</head>
<body>

    <nav class="top-nav"><div class="logo">ANIME<span style="color:var(--accent)">KINGDOM</span></div></nav>

    <div class="hero">
        <img src="IMG_20260322_225449_963.jpg" class="hero-img">
        <div class="hero-info">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ඇනිමේ නම සොයන්න...">
                <button onclick="searchAnime()">සොයන්න</button>
            </div>
        </div>
    </div>

    <div class="content">
        <h3>🔥 Trending Now</h3>
        <div class="anime-grid" id="popularAnime"></div>
    </div>

    <!-- Details Page -->
    <div id="anime-modal" class="modal">
        <div class="modal-header">
            <div class="back-btn" onclick="closeModal()"><i class="fas fa-arrow-left"></i></div>
            <img id="modalBanner" class="modal-banner">
        </div>
        <div class="modal-body">
            <div class="anime-meta">
                <h1 id="modalTitle"></h1>
                <p id="modalYear" style="color:#888"></p>
            </div>
            <div class="action-btns">
                <div class="btn-watch" onclick="scrollToEpisodes()"><i class="fas fa-play"></i> Watch</div>
                <div class="btn-list"><i class="fas fa-list"></i> Episode List</div>
            </div>
            <div class="ep-section">
                <h4>Episodes</h4>
                <div id="episodeList"></div>
            </div>
        </div>
    </div>

    <!-- Video Player -->
    <div id="video-modal">
        <div onclick="closeVideo()" style="position:absolute; top:20px; right:20px; font-size:30px; cursor:pointer;"><i class="fas fa-times"></i></div>
        <video id="main-player" controls></video>
        <h4 id="videoTitle" style="margin-top:20px;"></h4>
    </div>

    <script>
        const API_BASE = "https://consumet-api-production-e852.up.railway.app";

        window.onload = () => { loadPopular(); };

        async function loadPopular() {
            const res = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: `query { Page(perPage: 12) { media(sort: TRENDING_DESC, type: ANIME) { id title { english romaji } coverImage { large } bannerImage } } }` })
            });
            const data = await res.json();
            renderCards(data.data.Page.media);
        }

        function renderCards(list) {
            const container = document.getElementById('popularAnime');
            container.innerHTML = list.map(anime => `
                <div class="card" onclick="showDetails(${anime.id}, '${anime.title.english || anime.title.romaji}', '${anime.bannerImage || anime.coverImage.large}')">
                    <img src="${anime.coverImage.large}">
                    <div class="card-title">${anime.title.english || anime.title.romaji}</div>
                </div>`).join('');
        }

        async function showDetails(id, title, banner) {
            const modal = document.getElementById('anime-modal');
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBanner').src = banner;
            modal.style.display = "flex";
            document.getElementById('episodeList').innerHTML = "<p>Loading episodes...</p>";

            try {
                const sRes = await fetch(`${API_BASE}/${encodeURIComponent(title)}`);
                const sData = await sRes.json();
                const animeId = sData.results[0]?.id;

                if (!animeId) throw "Not found";

                const iRes = await fetch(`${API_BASE}/info/${animeId}`);
                const iData = await iRes.json();
                
                document.getElementById('episodeList').innerHTML = iData.episodes.map(ep => `
                    <div class="ep-item" onclick="playVideo('${ep.id}', '${title} - EP ${ep.number}')">
                        <div class="ep-thumb"><i class="fas fa-play"></i></div>
                        <div class="ep-info">
                            <h4>Episode ${ep.number}</h4>
                            <p>HD Streaming Available</p>
                        </div>
                    </div>`).join('');
            } catch (e) {
                document.getElementById('episodeList').innerHTML = "<p style='color:red;'>දත්ත ලබා ගැනීමේ දෝෂයකි.</p>";
            }
        }

        async function playVideo(epId, title) {
            try {
                const res = await fetch(`${API_BASE}/watch/${epId}`);
                const data = await res.json();
                const link = data.sources.find(s => s.quality === 'default' || s.quality === '720p')?.url;

                const player = document.getElementById('main-player');
                document.getElementById('video-modal').style.display = "flex";
                document.getElementById('videoTitle').innerText = title;

                if (Hls.isSupported()) {
                    const hls = new Hls(); hls.loadSource(link); hls.attachMedia(player);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
                } else { player.src = link; player.play(); }
            } catch (e) { alert("Error loading video!"); }
        }

        function closeModal() { document.getElementById('anime-modal').style.display = "none"; }
        function closeVideo() { const p = document.getElementById('main-player'); p.pause(); p.src = ""; document.getElementById('video-modal').style.display = "none"; }
    </script>
</body>
</html>
