<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Anime - Anime Kingdom</title>
    <link rel="stylesheet" href="style.css"> <!-- ඔබේ පැරණි style file එක -->
</head>
<body style="background-color: #121212; color: white;">

    <div class="search-page-header">
        <button class="back-btn" onclick="history.back()">←</button>
        <div class="search-bar-advanced">
            <input type="text" placeholder="Search..." autofocus>
        </div>
        <button class="filter-btn">⚙️</button>
    </div>

    <div class="anime-list-container">
        <!-- එක ඇනිමේ එකක් සඳහා වන card එක -->
        <div class="search-card">
            <div class="img-wrapper">
                <img src="one-piece.jpg" alt="One Piece">
                <div class="play-icon">▶</div>
            </div>
            <h3>One Piece</h3>
        </div>

        <div class="search-card">
            <div class="img-wrapper">
                <img src="naruto.jpg" alt="Naruto">
                <div class="play-icon">▶</div>
            </div>
            <h3>Naruto: Shippuden</h3>
        </div>
        <!-- තව ඇනිමේ මේ විදියටම එක් කරන්න -->
    </div>

</body>
</html>
